<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Designit Lottie Editor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <style>
        /* ============ DESIGN TOKENS ============ */
        :root {
            --bg: #F2F2F7; --surface: #FFFFFF; --surface-2: #F4F4F6; --surface-3: #E5E5EA;
            --border: rgba(0,0,0,0.08); --border-strong: rgba(0,0,0,0.13);
            --text-1: #1C1C1E; --text-2: #636366; --text-3: #AEAEB2;
            --accent-blue: #007AFF; --accent-purple: #5856D6;
            --accent-orange: #FF9500; --accent-green: #34C759; --accent-red: #FF3B30;
            --tab-active-color: #007AFF; --tab-badge-bg: rgba(0,122,255,0.12);
            --radius-xs: 6px; --radius-sm: 8px; --radius-md: 12px; --radius-lg: 16px; --radius-xl: 22px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.08), 0 1px 4px rgba(0,0,0,0.04);
            --shadow-lg: 0 16px 48px rgba(0,0,0,0.14), 0 4px 12px rgba(0,0,0,0.06);
        }
        /* ============ RESET ============ */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; display: flex; height: 100vh; background: var(--bg); color: var(--text-1); overflow: hidden; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.2); }

        /* ============ SIDEBAR ============ */
        #sidebar { width: 308px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; }

        /* Header */
        .header-section { padding: 16px 16px 14px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .app-wordmark { display: flex; align-items: center; gap: 10px; margin-bottom: 14px; }
        .app-logo { width: 30px; height: 30px; border-radius: 8px; background: #007AFF; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,122,255,0.3); }
        .app-name { font-size: 14px; font-weight: 700; color: var(--text-1); letter-spacing: -0.3px; }
        .app-name span { font-weight: 400; color: var(--text-3); }

        /* Upload Zone */
        .upload-zone { position: relative; width: 100%; border: 1.5px dashed rgba(0,0,0,0.15); border-radius: var(--radius-md); background: var(--surface-2); padding: 14px 12px; text-align: center; cursor: pointer; transition: all 0.2s ease; overflow: hidden; }
        .upload-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; font-size: 100px; }
        .upload-zone:hover { border-color: var(--accent-blue); background: rgba(0,122,255,0.04); }
        .upload-zone.loaded { border-style: solid; border-color: var(--accent-green); background: rgba(52,199,89,0.05); }
        .upload-icon { width: 30px; height: 30px; border-radius: 50%; background: rgba(0,122,255,0.1); display: flex; align-items: center; justify-content: center; margin: 0 auto 7px; color: var(--accent-blue); transition: all 0.25s; }
        .upload-zone.loaded .upload-icon { background: rgba(52,199,89,0.12); color: var(--accent-green); }
        .upload-label { font-size: 12px; font-weight: 600; color: var(--text-2); transition: color 0.2s; display: block; }
        .upload-zone:hover .upload-label { color: var(--accent-blue); }
        .upload-zone.loaded .upload-label { color: var(--accent-green); }
        .upload-hint { font-size: 10px; color: var(--text-3); margin-top: 2px; }

        /* Global Settings */
        #global-settings { display: none; padding-top: 12px; margin-top: 12px; border-top: 1px solid var(--border); }
        .section-label { font-size: 9px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.9px; margin-bottom: 8px; }
        .global-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
        .input-group { display: flex; flex-direction: column; gap: 3px; }
        .input-group label { font-size: 9px; color: var(--text-3); font-weight: 600; letter-spacing: 0.3px; text-transform: uppercase; }
        .pill-input { width: 100%; padding: 7px 10px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); font-size: 12px; font-family: inherit; background: var(--surface-2); color: var(--text-1); transition: all 0.15s; outline: none; }
        .pill-input:focus { border-color: var(--accent-blue); background: var(--surface); box-shadow: 0 0 0 3px rgba(0,122,255,0.12); }

        /* Layer List */
        #layer-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; scroll-behavior: smooth; }
        .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px 20px; text-align: center; color: var(--text-3); gap: 8px; }
        .empty-state-icon { width: 40px; height: 40px; border-radius: 50%; background: var(--surface-2); display: flex; align-items: center; justify-content: center; margin-bottom: 2px; }
        .empty-state-title { font-size: 12px; font-weight: 600; color: var(--text-2); }
        .empty-state-sub { font-size: 11px; max-width: 160px; line-height: 1.5; }

        /* Tab Switcher — segmented pill control */
        .tab-switcher { position: sticky; top: 0; z-index: 20; padding: 10px 12px; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .tab-track { display: flex; position: relative; background: var(--surface-2); border-radius: 10px; padding: 3px; gap: 2px; }
        .tab-pill-bg { display: none; }
        .tab-btn { flex: 1; padding: 7px 6px; border: none; background: transparent; border-radius: 8px; font-size: 11px; font-weight: 500; color: var(--text-3); cursor: pointer; position: relative; z-index: 2; display: flex; align-items: center; justify-content: center; gap: 4px; white-space: nowrap; transition: all 0.18s ease; font-family: inherit; }
        .tab-btn.active { background: var(--surface); color: var(--text-1); font-weight: 600; box-shadow: var(--shadow-sm); }
        .tab-badge { display: inline-flex; align-items: center; justify-content: center; min-width: 15px; height: 15px; padding: 0 4px; border-radius: 100px; font-size: 9px; font-weight: 700; background: rgba(0,0,0,0.06); color: var(--text-3); transition: all 0.2s; }
        .tab-btn.active .tab-badge { background: var(--tab-badge-bg); color: var(--tab-active-color); }

        /* Tab Content */
        .tab-content { flex: 1; padding: 14px; }
        .tab-content-advanced { flex: 1; padding: 14px; background: var(--surface-2); }

        /* Tab Header */
        .tab-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .tab-count-label { font-size: 11px; font-weight: 600; color: var(--text-2); }
        .tab-hint { font-size: 10px; color: var(--text-3); }

        /* ============ COLOR TOKENS ============ */
        .color-token-card { display: flex; align-items: center; gap: 10px; padding: 8px 10px; margin-bottom: 3px; border-radius: var(--radius-md); border: 1px solid transparent; transition: background 0.12s, border-color 0.12s; cursor: default; }
        .color-token-card:hover { background: var(--surface-2); border-color: var(--border); }
        .color-token-card.token-highlighted { background: rgba(0,122,255,0.06); border-color: rgba(0,122,255,0.22); }
        .color-swatch-wrap { position: relative; flex-shrink: 0; }
        .color-swatch-large { width: 32px; height: 32px; border-radius: var(--radius-sm); border: none; cursor: pointer; display: block; padding: 0; background: none; transition: transform 0.15s; }
        .color-swatch-large:hover { transform: scale(1.06); }
        .color-swatch-large::-webkit-color-swatch-wrapper { padding: 0; border-radius: 7px; }
        .color-swatch-large::-webkit-color-swatch { border: 1px solid rgba(0,0,0,0.1); border-radius: 7px; }
        .color-meta { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; }
        .color-hex-label { font-size: 12px; font-weight: 600; color: var(--text-1); letter-spacing: 0.1px; text-transform: uppercase; }
        .color-usage-badge { display: inline-flex; align-items: center; font-size: 10px; font-weight: 600; color: var(--text-3); white-space: nowrap; }
        .color-context-list { font-size: 10px; color: var(--text-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .unlink-btn { display: block; background: var(--surface-2); border: 1px solid var(--border-strong); border-radius: 100px; padding: 3px 8px; font-size: 10px; font-weight: 600; color: var(--text-2); cursor: pointer; white-space: nowrap; transition: all 0.12s; font-family: inherit; flex-shrink: 0; }
        .unlink-btn:hover { background: var(--surface-3); color: var(--text-1); border-color: rgba(0,0,0,0.2); }
        .color-section-label { font-size: 9px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.8px; margin: 14px 0 6px 10px; }
        .color-section-label:first-child { margin-top: 0; }
        .single-color-row { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 10px; margin-bottom: 3px; transition: border-color 0.12s; }
        .single-color-row:hover { border-color: rgba(0,0,0,0.15); }
        .single-color-swatch { width: 20px; height: 20px; border-radius: 5px; border: none; padding: 0; cursor: pointer; background: none; flex-shrink: 0; }
        .single-color-swatch::-webkit-color-swatch-wrapper { padding: 0; }
        .single-color-swatch::-webkit-color-swatch { border: 1px solid rgba(0,0,0,0.1); border-radius: 4px; }
        .single-color-label { font-size: 10px; color: var(--text-2); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* ============ IMAGES TAB ============ */
        .image-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .image-thumb-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); overflow: hidden; transition: border-color 0.15s, box-shadow 0.15s; }
        .image-thumb-card:hover { border-color: rgba(0,0,0,0.14); box-shadow: var(--shadow-md); }
        .image-thumb-img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; background: var(--surface-2); }
        .image-thumb-placeholder { width: 100%; aspect-ratio: 1; background: var(--surface-2); display: flex; align-items: center; justify-content: center; color: var(--text-3); }
        .image-thumb-info { padding: 8px; }
        .image-thumb-name { font-size: 11px; color: var(--text-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 500; }
        .image-thumb-id { font-size: 9px; color: var(--text-3); margin-top: 1px; }
        .image-replace-btn-wrap { position: relative; overflow: hidden; margin-top: 6px; }
        .image-replace-btn-wrap input[type="file"] { position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; height: 100%; width: 100%; }
        .image-replace-btn { display: block; width: 100%; background: var(--surface-2); color: var(--text-2); border: 1px solid var(--border-strong); padding: 5px 6px; border-radius: var(--radius-sm); font-size: 10px; font-weight: 500; text-align: center; transition: background 0.12s; font-family: inherit; }
        .image-replace-btn-wrap:hover .image-replace-btn { background: var(--surface-3); color: var(--text-1); }
        .image-replaced-badge { font-size: 9px; color: var(--accent-green); font-weight: 600; text-align: center; margin-top: 3px; display: none; }
        .image-replaced-badge.visible { display: block; }

        /* ============ ADVANCED TAB ============ */
        .search-wrap { position: relative; margin-bottom: 10px; }
        .search-wrap svg { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--text-3); }
        #layer-search { width: 100%; padding: 6px 10px 6px 28px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); font-size: 11px; font-family: inherit; outline: none; background: var(--surface); color: var(--text-1); transition: border-color 0.12s; }
        #layer-search:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 2px rgba(0,102,255,0.1); }
        .list-section-header { font-size: 9px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.7px; margin: 14px 0 7px 0; display: flex; justify-content: space-between; align-items: center; user-select: none; }
        .list-section-header:first-child { margin-top: 0; }
        .layer-count-badge { background: var(--surface-3); color: var(--text-2); padding: 1px 6px; border-radius: 100px; font-size: 9px; font-weight: 700; }
        .layer-item { background: var(--surface); border: 1px solid var(--border); margin-bottom: 5px; border-radius: var(--radius-md); transition: border-color 0.12s, box-shadow 0.12s; overflow: hidden; position: relative; }
        .layer-item::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; border-radius: 1.5px 0 0 1.5px; background: transparent; transition: background 0.15s; }
        .layer-item[data-layer-type="shape"]::before { background: var(--accent-blue); }
        .layer-item[data-layer-type="image"]::before { background: var(--accent-purple); }
        .layer-item[data-layer-type="precomp"]::before { background: var(--accent-orange); }
        .layer-item:hover { border-color: rgba(0,0,0,0.13); box-shadow: var(--shadow-sm); }
        .layer-item.active { border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(0,122,255,0.12); }
        .layer-item.deleted-layer { background: var(--surface-2); opacity: 0.45; }
        .layer-header { padding: 8px 10px 8px 13px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; user-select: none; }
        .layer-name-wrapper { display: flex; flex-direction: row; align-items: center; flex: 1; overflow: hidden; }
        .layer-thumb { width: 22px; height: 22px; border-radius: var(--radius-xs); background: var(--surface-2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; margin-right: 8px; flex-shrink: 0; overflow: hidden; }
        .layer-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .layer-name-col { display: flex; flex-direction: column; overflow: hidden; }
        .layer-name { font-weight: 500; font-size: 11px; color: var(--text-1); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 4px; }
        .layer-context { font-size: 8px; font-weight: 600; color: var(--text-3); text-transform: uppercase; margin-top: 1px; letter-spacing: 0.4px; }
        .type-badge { display: inline-flex; font-size: 8px; padding: 1px 4px; border-radius: 100px; font-weight: 700; background: var(--surface-2); color: var(--text-3); }
        .type-badge.shape { background: rgba(0,102,255,0.08); color: var(--accent-blue); }
        .type-badge.image { background: rgba(99,102,241,0.08); color: var(--accent-purple); }
        .type-badge.precomp { background: rgba(245,158,11,0.08); color: var(--accent-orange); }
        .layer-actions { display: flex; align-items: center; gap: 1px; margin-left: 6px; }
        .action-btn { background: transparent; border: none; width: 24px; height: 24px; border-radius: var(--radius-xs); cursor: pointer; color: var(--text-3); display: flex; align-items: center; justify-content: center; transition: all 0.12s; flex-shrink: 0; font-family: inherit; }
        .action-btn:hover { background: var(--surface-2); color: var(--text-1); }
        .action-btn.delete-btn:hover { color: var(--accent-red); background: rgba(239,68,68,0.07); }
        .action-btn.solo-btn:hover { color: var(--accent-orange); background: rgba(245,158,11,0.07); }
        .chevron { width: 12px; height: 12px; color: var(--text-3); transition: transform 0.2s ease; margin-left: 2px; flex-shrink: 0; }
        .layer-item.expanded .chevron { transform: rotate(180deg); }
        .layer-body { display: none; padding: 0 11px 11px 13px; border-top: 1px solid var(--border); background: var(--surface-2); }
        .layer-item.expanded .layer-body { display: block; padding-top: 10px; }
        .controls-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .control-row { display: flex; align-items: center; gap: 5px; background: var(--surface); padding: 4px 7px; border-radius: var(--radius-xs); border: 1px solid var(--border); transition: border-color 0.12s; }
        .control-row:focus-within { border-color: var(--accent-blue); }
        .control-row label { font-size: 9px; color: var(--text-3); font-weight: 700; width: 14px; text-align: center; flex-shrink: 0; text-transform: uppercase; }
        .control-row input { border: none; background: transparent; padding: 1px 0; font-size: 11px; font-family: inherit; width: 100%; color: var(--text-1); outline: none; }
        .color-group-title { grid-column: span 2; font-size: 9px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.6px; margin-top: 8px; }
        .color-row { grid-column: span 2; display: flex; align-items: center; justify-content: space-between; background: var(--surface); padding: 4px 7px; border-radius: var(--radius-xs); border: 1px solid var(--border); }
        .color-row label { font-size: 10px; color: var(--text-2); font-weight: 500; }
        input[type="color"] { border: none; width: 22px; height: 22px; padding: 0; background: none; cursor: pointer; border-radius: 3px; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 1px solid rgba(0,0,0,0.1); border-radius: 2px; }
        .image-replace-wrap { position: relative; overflow: hidden; flex: 1; }
        .image-replace-wrap input[type="file"] { position: absolute; left: 0; top: 0; opacity: 0; cursor: pointer; height: 100%; width: 100%; }
        .image-btn { background: var(--surface-2); color: var(--text-2); border: 1px solid var(--border-strong); padding: 4px 6px; border-radius: var(--radius-xs); font-size: 10px; font-weight: 500; text-align: center; display: block; width: 100%; transition: all 0.12s; font-family: inherit; }
        .image-replace-wrap:hover .image-btn { background: var(--surface-3); color: var(--text-1); }
        .precomp-subtree { transition: all 0.2s; }

        /* ============ FOOTER ============ */
        .footer-section { padding: 12px 14px 16px; border-top: 1px solid var(--border); background: var(--surface); flex-shrink: 0; }
        .btn-export { background: var(--accent-blue); color: white; border: none; padding: 14px 18px; border-radius: 100px; font-weight: 700; font-size: 15px; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 7px; font-family: inherit; transition: background 0.15s, transform 0.12s, box-shadow 0.15s; box-shadow: 0 4px 16px rgba(0,122,255,0.35); letter-spacing: -0.2px; }
        .btn-export:hover { background: #0066DD; box-shadow: 0 6px 20px rgba(0,122,255,0.45); }
        .btn-export:active { transform: scale(0.97); background: #0055CC; box-shadow: 0 2px 8px rgba(0,122,255,0.25); }
        .btn-export-subtitle { font-size: 10px; color: var(--text-3); text-align: center; margin-top: 7px; letter-spacing: 0.1px; }

        /* ============ PREVIEW ============ */
        #preview-wrapper { flex: 1; display: flex; flex-direction: column; position: relative; background: var(--bg); }
        #zoom-toolbar { position: absolute; top: 16px; right: 16px; z-index: 20; display: flex; align-items: center; background: var(--surface); padding: 4px; border-radius: 100px; box-shadow: var(--shadow-md); border: 1px solid var(--border); gap: 0; }
        .zoom-btn { background: transparent; border: none; width: 28px; height: 28px; border-radius: 100px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-2); transition: all 0.12s; font-family: inherit; }
        .zoom-btn:hover { background: var(--surface-2); color: var(--text-1); }
        .zoom-btn:active { transform: scale(0.88); }
        #zoom-level { font-size: 11px; font-weight: 600; min-width: 40px; text-align: center; cursor: pointer; color: var(--text-2); font-family: inherit; transition: color 0.12s; }
        #zoom-level:hover { color: var(--accent-blue); }
        #preview-container { flex: 1; overflow: auto; display: flex; align-items: center; justify-content: center; background-image: radial-gradient(circle, #D1D1D6 1px, transparent 1px); background-size: 20px 20px; position: relative; }
        #lottie-player { background: var(--surface); box-shadow: var(--shadow-lg); transition: width 0.2s ease, height 0.2s ease; transform-origin: center center; margin: auto; border-radius: 2px; }
        svg .lottie-layer { cursor: pointer; pointer-events: all; }
        svg.dimming .lottie-layer { opacity: 0.15; transition: opacity 0.2s ease; }
        svg.dimming .lottie-layer.highlighted, svg.dimming .lottie-layer.active-layer { opacity: 1; transition: opacity 0.2s ease; }
        #bbox-selected { position: absolute; border: 2px solid var(--accent-blue); border-radius: 4px; pointer-events: none; z-index: 100; display: none; transition: width 0.05s, height 0.05s, top 0.05s, left 0.05s; box-shadow: 0 0 0 1px rgba(0,122,255,0.15); }
        #bbox-hover { position: absolute; border: 2px dashed rgba(0,122,255,0.5); border-radius: 4px; pointer-events: none; z-index: 99; display: none; transition: width 0.05s, height 0.05s, top 0.05s, left 0.05s; }

        /* ============ TIMELINE ============ */
        #timeline-bar { background: var(--surface); border-top: 1px solid var(--border); padding: 10px 18px; display: flex; align-items: center; gap: 12px; z-index: 10; }
        #play-pause-btn { background: var(--accent-blue); color: white; border: none; width: 34px; height: 34px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s, box-shadow 0.15s, transform 0.12s; font-family: inherit; box-shadow: 0 2px 10px rgba(0,122,255,0.3); }
        #play-pause-btn:hover { background: #0066DD; box-shadow: 0 4px 14px rgba(0,122,255,0.4); }
        #play-pause-btn:active { transform: scale(0.93); }
        .frame-counter { font-size: 10px; font-weight: 600; font-variant-numeric: tabular-nums; color: var(--text-3); min-width: 30px; text-align: center; font-family: inherit; }
        input[type="range"] { flex: 1; -webkit-appearance: none; appearance: none; background: transparent; cursor: pointer; height: 16px; }
        input[type="range"]::-webkit-slider-runnable-track { background: var(--surface-3); height: 4px; border-radius: 100px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; margin-top: -6px; background: var(--surface); border: 2px solid var(--accent-blue); height: 16px; width: 16px; border-radius: 50%; transition: transform 0.1s; box-shadow: 0 1px 4px rgba(0,0,0,0.15); }
        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.18); }

        /* ============ EXPORT DIALOG ============ */
        .diff-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.35); z-index: 1000; display: flex; align-items: flex-end; justify-content: center; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
        .diff-dialog { background: var(--surface); border-radius: var(--radius-xl) var(--radius-xl) 0 0; padding: 24px 22px 36px; max-width: 420px; width: 100%; box-shadow: var(--shadow-lg); overflow: hidden; }
        .diff-handle { width: 36px; height: 4px; background: var(--surface-3); border-radius: 2px; margin: 0 auto 22px; }
        .diff-dialog h4 { margin: 0 0 5px 0; font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
        .diff-subtitle { font-size: 13px; color: var(--text-2); margin-bottom: 18px; }
        .diff-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
        .diff-stat { background: var(--surface-2); border-radius: var(--radius-md); padding: 14px; }
        .diff-stat-num { font-size: 28px; font-weight: 700; line-height: 1; margin-bottom: 4px; letter-spacing: -0.5px; }
        .diff-stat-num.active { color: var(--accent-blue); }
        .diff-stat-num.zero { color: var(--text-3); }
        .diff-stat-label { font-size: 10px; color: var(--text-2); font-weight: 500; }
        .diff-note { font-size: 11px; color: var(--text-3); margin-bottom: 18px; line-height: 1.5; }
        .diff-actions { display: flex; flex-direction: column; gap: 10px; }
        .diff-actions button { flex: 1; padding: 14px; border-radius: 100px; font-weight: 700; font-size: 15px; cursor: pointer; border: none; font-family: inherit; transition: all 0.15s; letter-spacing: -0.2px; }
        .diff-actions button:active { transform: scale(0.97); }
        .diff-cancel { background: var(--surface-2); color: var(--text-1); font-weight: 600; font-size: 14px; border-radius: var(--radius-md) !important; }
        .diff-cancel:hover { background: var(--surface-3); }
        .diff-confirm { background: var(--accent-blue); color: white; box-shadow: 0 4px 16px rgba(0,122,255,0.35); }
        .diff-confirm:hover { background: #0066DD; box-shadow: 0 6px 20px rgba(0,122,255,0.45); }

        /* ============ EMPTY STATES ============ */
        .tab-empty-state { text-align: center; color: var(--text-3); font-size: 11px; padding: 32px 16px; }
    </style>
</head>
<body>
    <div id="sidebar">
        <div class="header-section">
            <div class="app-wordmark">
                <div class="app-logo">
                    <svg width="13" height="13" viewBox="0 0 24 24" fill="none">
                        <path d="M12 2L4 7v10l8 5 8-5V7L12 2z" fill="white" fill-opacity="0.95"/>
                    </svg>
                </div>
                <div class="app-name">Designit <span>/ Lottie</span></div>
            </div>
            <div class="upload-zone" id="upload-zone">
                <input type="file" id="file-input" accept=".json">
                <div class="upload-icon" id="upload-icon">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                </div>
                <span class="upload-label" id="upload-label">Upload Lottie JSON</span>
                <div class="upload-hint">or drag and drop a .json file</div>
            </div>
            <div id="global-settings">
                <div class="section-label">Canvas</div>
                <div class="global-grid">
                    <div class="input-group"><label>Width</label><input type="number" class="pill-input" id="canvas-w" value="0"></div>
                    <div class="input-group"><label>Height</label><input type="number" class="pill-input" id="canvas-h" value="0"></div>
                    <div class="input-group" style="grid-column:span 2;"><label>Playback Speed &times;</label><input type="number" class="pill-input" id="play-speed" value="1.0" step="0.1" min="0.1"></div>
                </div>
            </div>
        </div>
        <div id="layer-list">
            <div class="empty-state" id="empty-state-msg">
                <div class="empty-state-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-3)">
                        <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/>
                    </svg>
                </div>
                <div class="empty-state-title">No file loaded</div>
                <div class="empty-state-sub">Upload a Lottie JSON to start editing colors, images, and layers</div>
            </div>
        </div>
        <div class="footer-section" id="footer-section" style="display:none;">
            <button class="btn-export" id="download-btn">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                Export JSON
            </button>
            <div class="btn-export-subtitle">saves all modifications as .json</div>
        </div>
    </div>

    <div id="preview-wrapper">
        <div id="zoom-toolbar" style="display:none;">
            <button class="zoom-btn" id="zoom-out" title="Zoom Out">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
            <span id="zoom-level" title="Reset Zoom">100%</span>
            <button class="zoom-btn" id="zoom-in" title="Zoom In">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            </button>
        </div>
        <div id="preview-container">
            <div id="bbox-selected"></div>
            <div id="bbox-hover"></div>
            <div id="lottie-player"></div>
        </div>
        <div id="timeline-bar" style="display:none;">
            <button id="play-pause-btn">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            </button>
            <span class="frame-counter" id="current-frame">0</span>
            <input type="range" id="timeline-slider" min="0" max="100" value="0" step="1">
            <span class="frame-counter" id="total-frames">100</span>
        </div>
    </div>
    <script>
        // ===== SECTION 1: STATE & CONSTANTS =====
        let originalData = null; let modifiedData = null; let animInstance = null;
        let currentFileName = "optimized_animation.json";
        let layerMods = {};
        let imageAssetOverrides = {};
        let editableList = [];
        let structuralList = [];
        let emptyList = [];
        let layerGraph = { nodes: {}, roots: [], assetRoots: {}, byInd: {} };
        let svgLayerMap = {};
        let renderDebounceId = null;
        let hoveredLayerId = null; let selectedLayerId = null;
        let baseScale = 1; let userZoom = 1;
        const MAX_UNDO_STACK = 50;
        let undoStack = [];
        let redoStack = [];
        let undoPushTimer = null;
        let undoStatePending = false;
        let imageDataCache = {};
        let searchFilter = '';
        let frameHighlightTimer = null;
        let designTokens = [];
        let tokenDiffMap = {};
        let activeTab = 'colors';
        let hoveredColorHex = null;

        const ICONS = {
            play: `<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>`,
            pause: `<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`,
            eyeOpen: `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`,
            eyeClosed: `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`,
            trash: `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>`,
            restore: `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>`,
            solo: `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>`,
            image: `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`,
            shape: `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 22 20 2 20"/></svg>`,
            folder: `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>`,
            empty: `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-dasharray="3 2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>`
        };

        // ===== SECTION 2: UTILITIES =====
        function rgbToHex(arr) { if(!arr||arr.length<3) return '#000000'; const r=Math.round(arr[0]*255),g=Math.round(arr[1]*255),b=Math.round(arr[2]*255); return "#"+(1<<24|r<<16|g<<8|b).toString(16).slice(1).toUpperCase(); }
        function hexToRgb(hex) { let r=0,g=0,b=0; if(hex.length===7){r=parseInt(hex.substring(1,3),16)/255;g=parseInt(hex.substring(3,5),16)/255;b=parseInt(hex.substring(5,7),16)/255;} return [r,g,b,1]; }
        function getByPath(obj, pathStr) { const parts = pathStr.replace(/\[(\d+)\]/g, '.$1').split('.').filter(Boolean); let cur = obj; for (const p of parts) { if (cur == null) return undefined; cur = cur[p]; } return cur; }
        function setByPath(obj, pathStr, value) { const parts = pathStr.replace(/\[(\d+)\]/g, '.$1').split('.').filter(Boolean); let cur = obj; for (let i = 0; i < parts.length - 1; i++) { if (cur == null) return; cur = cur[parts[i]]; } if (cur != null) cur[parts[parts.length - 1]] = value; }
        function getHue(hex) { const [r,g,b]=hexToRgb(hex); const max=Math.max(r,g,b),min=Math.min(r,g,b),d=max-min; if(d===0) return 0; let h; switch(max){case r:h=(g-b)/d+(g<b?6:0);break;case g:h=(b-r)/d+2;break;default:h=(r-g)/d+4;} return h/6; }
        function getLightness(hex) { const [r,g,b]=hexToRgb(hex); return (Math.max(r,g,b)+Math.min(r,g,b))/2; }
        function getSaturation(hex) { const [r,g,b]=hexToRgb(hex); const max=Math.max(r,g,b),min=Math.min(r,g,b),d=max-min; const l=(max+min)/2; return d===0?0:d/(1-Math.abs(2*l-1)); }

        // ===== SECTION 3: ANIMATION HELPERS =====
        const TAB_COLORS = {
            colors:   { active: '#0066FF', badge: 'rgba(0,102,255,0.1)' },
            images:   { active: '#6366F1', badge: 'rgba(99,102,241,0.1)' },
            advanced: { active: '#F59E0B', badge: 'rgba(245,158,11,0.1)' }
        };

        function updateTabColors(tab) {
            const c = TAB_COLORS[tab] || TAB_COLORS.colors;
            document.documentElement.style.setProperty('--tab-active-color', c.active);
            document.documentElement.style.setProperty('--tab-badge-bg', c.badge);
        }

        function positionTabPill(tab, animate) {
            // No-op: pill replaced with CSS underline indicator
        }

        function animateTabContentIn() {
            if (typeof anime === 'undefined') return;
            requestAnimationFrame(() => {
                const cards = document.querySelectorAll('#layer-list .color-token-card, #layer-list .image-thumb-card, #layer-list .layer-item, #layer-list .list-section-header');
                if (cards.length === 0) return;
                anime({ targets: Array.from(cards), opacity: [0, 1], translateY: [10, 0], duration: 350, delay: anime.stagger(18, {start: 40}), easing: 'cubicBezier(0.16, 1, 0.3, 1)' });
            });
        }

        function animateFileLoad() {
            const zone = document.getElementById('upload-zone');
            const icon = document.getElementById('upload-icon');
            zone.classList.add('loaded');
            document.getElementById('upload-label').textContent = 'File loaded ✓';
            if (typeof anime !== 'undefined') {
                anime({ targets: icon, scale: [0.8, 1.25, 1], duration: 500, easing: 'spring(1, 80, 10, 0)' });
            }
        }

        function animateDialogOut(overlay, callback) {
            if (typeof anime !== 'undefined') {
                const dialog = overlay.querySelector('.diff-dialog');
                anime({ targets: overlay, opacity: [1, 0], duration: 200, easing: 'linear', complete: () => { overlay.remove(); if (callback) callback(); } });
                anime({ targets: dialog, translateY: ['0%', '100%'], duration: 300, easing: 'cubicBezier(0.4, 0, 1, 1)' });
            } else { overlay.remove(); if (callback) callback(); }
        }

        // ===== SECTION 4: PLAYER CONTROLS =====
        const slider = document.getElementById('timeline-slider');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const currentFrameEl = document.getElementById('current-frame');

        function togglePlay() {
            if (!animInstance) return;
            if (animInstance.isPaused) { animInstance.play(); playPauseBtn.innerHTML = ICONS.pause; }
            else { animInstance.pause(); playPauseBtn.innerHTML = ICONS.play; }
            if (typeof anime !== 'undefined') {
                anime({ targets: '#play-pause-btn', scale: [1, 1.18, 1], duration: 380, easing: 'spring(1, 80, 10, 0)' });
            }
        }

        playPauseBtn.addEventListener('click', togglePlay);
        document.addEventListener('keydown', (e) => {
            if (document.activeElement.tagName === 'INPUT') return;
            if (e.code === 'Space' && animInstance) { e.preventDefault(); togglePlay(); }
            if ((e.metaKey || e.ctrlKey) && e.key === 'z' && !e.shiftKey) { e.preventDefault(); undo(); }
            if ((e.metaKey || e.ctrlKey) && (e.key === 'y' || (e.key === 'z' && e.shiftKey))) { e.preventDefault(); redo(); }
        });
        slider.addEventListener('input', (e) => {
            if (animInstance) {
                animInstance.pause(); playPauseBtn.innerHTML = ICONS.play;
                animInstance.goToAndStop(parseInt(e.target.value), true);
                currentFrameEl.innerText = e.target.value;
                updateDynamicBBoxes();
                updateActiveFrameHighlights(parseInt(e.target.value));
            }
        });

        document.getElementById('file-input').addEventListener('change', function(event) {
            const file = event.target.files[0]; if (!file) return;
            currentFileName = file.name;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    originalData = JSON.parse(e.target.result);
                    modifiedData = JSON.parse(JSON.stringify(originalData));
                    layerMods = {}; imageAssetOverrides = {};
                    editableList = []; structuralList = []; emptyList = [];
                    selectedLayerId = null; hoveredLayerId = null;
                    undoStack = []; redoStack = []; imageDataCache = {};
                    searchFilter = ''; svgLayerMap = {};
                    tokenDiffMap = {}; hoveredColorHex = null;
                    activeTab = 'colors';
                    document.getElementById('canvas-w').value = originalData.w || 1920;
                    document.getElementById('canvas-h').value = originalData.h || 1080;
                    document.getElementById('global-settings').style.display = 'block';
                    buildLayerGraph();
                    designTokens = extractDesignTokens(originalData);
                    animateFileLoad();
                    renderTreeSidebar();
                    calculateBaseScale();
                    applyModificationsAndRender();
                    document.getElementById('footer-section').style.display = 'block';
                    document.getElementById('zoom-toolbar').style.display = 'flex';
                    document.getElementById('timeline-bar').style.display = 'flex';
                } catch (err) { alert("Error parsing JSON. Ensure it's a valid Lottie file."); }
            };
            reader.readAsText(file);
        });

        window.addEventListener('resize', () => { if (animInstance) { calculateBaseScale(); updateDynamicBBoxes(); } });
        document.getElementById('preview-container').addEventListener('scroll', updateDynamicBBoxes);
        function calculateBaseScale() { if (!modifiedData) return; const container = document.getElementById('preview-container'); baseScale = Math.min((container.clientWidth-80)/modifiedData.w, (container.clientHeight-80)/modifiedData.h, 1); updatePlayerSize(); }
        function updatePlayerSize() { if (!modifiedData) return; const player = document.getElementById('lottie-player'); player.style.width = `${modifiedData.w * baseScale * userZoom}px`; player.style.height = `${modifiedData.h * baseScale * userZoom}px`; document.getElementById('zoom-level').innerText = `${Math.round(userZoom * 100)}%`; if (animInstance) animInstance.resize(); updateDynamicBBoxes(); }
        document.getElementById('zoom-in').addEventListener('click', () => { userZoom += 0.25; updatePlayerSize(); });
        document.getElementById('zoom-out').addEventListener('click', () => { userZoom = Math.max(0.25, userZoom - 0.25); updatePlayerSize(); });
        document.getElementById('zoom-level').addEventListener('click', () => { userZoom = 1; updatePlayerSize(); });

        // ===== SECTION 5: CANVAS INTERACTION =====
        document.getElementById('preview-container').addEventListener('click', function(e) {
            let target = e.target; let clickedId = null;
            while (target && target !== this && target.tagName !== 'svg') {
                if (target.classList && target.classList.contains('lottie-layer')) {
                    const match = Array.from(target.classList).find(c => c.startsWith('lottie-layer-'));
                    if (match) { clickedId = match.replace('lottie-layer-', ''); break; }
                }
                target = target.parentNode;
            }
            selectLayer(clickedId);
        });

        function selectLayer(id) {
            if (id && searchFilter) {
                const node = layerGraph.nodes[id];
                if (node && !(node.layer.nm || '').toLowerCase().includes(searchFilter.toLowerCase())) {
                    searchFilter = '';
                    const searchInput = document.getElementById('layer-search');
                    if (searchInput) searchInput.value = '';
                    applySearchFilter();
                }
            }
            selectedLayerId = id; updateCanvasHighlights(); updateDynamicBBoxes();
            document.querySelectorAll('.layer-item').forEach(el => el.classList.remove('active', 'expanded'));
            if (id) {
                const sidebarItem = document.querySelector(`.layer-item[data-item-id="${id}"]`);
                if (sidebarItem && !layerMods[id].deleted) {
                    sidebarItem.classList.add('active', 'expanded');
                    let parentEl = sidebarItem.parentElement;
                    while (parentEl) {
                        if (parentEl.classList && parentEl.classList.contains('precomp-subtree')) parentEl.style.display = 'block';
                        parentEl = parentEl.parentElement;
                    }
                    sidebarItem.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
        }

        function highlightLayer(id) { hoveredLayerId = id; updateCanvasHighlights(); updateDynamicBBoxes(); }

        function highlightColorTokens(hex) {
            const svgContainer = document.querySelector('#lottie-player svg');
            if (!svgContainer) return;
            document.querySelectorAll('.highlighted, .active-layer').forEach(el => el.classList.remove('highlighted', 'active-layer'));
            const layerIds = new Set();
            designTokens.filter(t => t.type === 'color').forEach(t => {
                const effectiveHex = tokenDiffMap[t.path] || t.value;
                if (effectiveHex === hex) layerIds.add(t.layerId);
            });
            if (layerIds.size > 0) {
                svgContainer.classList.add('dimming');
                layerIds.forEach(id => { const el = svgLayerMap[id] || document.querySelector(`.lottie-layer-${CSS.escape(id)}`); if (el) el.classList.add('highlighted'); });
            }
        }

        function clearColorHighlight() { const svgContainer = document.querySelector('#lottie-player svg'); if (!svgContainer) return; document.querySelectorAll('.highlighted').forEach(el => el.classList.remove('highlighted')); updateCanvasHighlights(); }

        function updateCanvasHighlights() {
            const svgContainer = document.querySelector('#lottie-player svg'); if (!svgContainer) return;
            document.querySelectorAll('.highlighted, .active-layer').forEach(el => el.classList.remove('highlighted', 'active-layer'));
            if (hoveredLayerId || selectedLayerId) svgContainer.classList.add('dimming'); else svgContainer.classList.remove('dimming');
            if (hoveredLayerId && layerMods[hoveredLayerId] && !layerMods[hoveredLayerId].deleted && layerMods[hoveredLayerId].visible) { const el = svgLayerMap[hoveredLayerId] || document.querySelector(`.lottie-layer-${hoveredLayerId}`); if (el) el.classList.add('highlighted'); }
            if (selectedLayerId && layerMods[selectedLayerId] && !layerMods[selectedLayerId].deleted && layerMods[selectedLayerId].visible) { const el = svgLayerMap[selectedLayerId] || document.querySelector(`.lottie-layer-${selectedLayerId}`); if (el) el.classList.add('active-layer'); }
        }

        function updateDynamicBBoxes() {
            if (!animInstance) return;
            const container = document.getElementById('preview-container');
            const containerRect = container.getBoundingClientRect();
            function applyBBox(layerId, element) {
                if (!layerId || !layerMods[layerId] || layerMods[layerId].deleted || !layerMods[layerId].visible) { element.style.display = 'none'; return; }
                const g = svgLayerMap[layerId] || document.querySelector(`.lottie-layer-${layerId}`);
                if (!g) { element.style.display = 'none'; return; }
                const shapes = Array.from(g.querySelectorAll('path, rect, ellipse, polygon, image'));
                let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity,hasVisible=false;
                shapes.forEach(shape => {
                    if (window.getComputedStyle(shape).display === 'none') return;
                    const rect = shape.getBoundingClientRect();
                    if (rect.width === 0 && rect.height === 0) return;
                    minX=Math.min(minX,rect.left); minY=Math.min(minY,rect.top); maxX=Math.max(maxX,rect.right); maxY=Math.max(maxY,rect.bottom); hasVisible=true;
                });
                if (!hasVisible) { element.style.display = 'none'; return; }
                element.style.display = 'block';
                element.style.left = (minX-containerRect.left+container.scrollLeft-2)+'px';
                element.style.top = (minY-containerRect.top+container.scrollTop-2)+'px';
                element.style.width = (maxX-minX+4)+'px';
                element.style.height = (maxY-minY+4)+'px';
            }
            applyBBox(selectedLayerId, document.getElementById('bbox-selected'));
            applyBBox(hoveredLayerId, document.getElementById('bbox-hover'));
        }

        function updateActiveFrameHighlights(currentFrame) {
            document.querySelectorAll('.layer-item').forEach(el => {
                const id = el.getAttribute('data-item-id');
                const node = layerGraph.nodes[id]; if (!node) return;
                const isActive = currentFrame >= node.ip && currentFrame < node.op;
                el.style.opacity = isActive ? '' : '0.45';
            });
        }

        document.getElementById('canvas-w').addEventListener('input', () => { calculateBaseScale(); applyModificationsAndRender(); });
        document.getElementById('canvas-h').addEventListener('input', () => { calculateBaseScale(); applyModificationsAndRender(); });
        document.getElementById('play-speed').addEventListener('input', function(e) { if (animInstance) animInstance.setSpeed(parseFloat(e.target.value) || 1.0); });

        // ===== SECTION 6: LAYER CLASSIFICATION =====
        function isHiddenOrEmpty(layer) {
            if (layer.hd === true) return true;
            if (layer.td !== undefined && layer.td !== 0) return true;
            if (layer.ty === 3) return true;
            if (layer.ty === 1) return true;
            if (layer.ty === 4) {
                function hasFillOrStroke(items) {
                    if (!items || !Array.isArray(items)) return false;
                    for (let i=0;i<items.length;i++){const it=items[i];if(['fl','st','gf','gs'].includes(it.ty))return true;if(it.ty==='gr'&&it.it){if(hasFillOrStroke(it.it))return true;}}
                    return false;
                }
                if (!hasFillOrStroke(layer.shapes)) return true;
            }
            return false;
        }

        function buildLayerGraph() {
            layerGraph = { nodes: {}, roots: [], assetRoots: {}, byInd: {} };
            editableList = []; structuralList = []; emptyList = [];
            const tyNames = { 0:"precomp", 1:"solid", 2:"image", 3:"null", 4:"shape", 5:"text" };
            function createNodes(layers, prefix, context, contextName) {
                layerGraph.byInd[context] = {};
                const ids = [];
                layers.forEach((layer, i) => {
                    const id = `${prefix}__${i}`; ids.push(id);
                    if (!layerMods[id]) layerMods[id] = { dx:0, dy:0, sx:1, sy:1, op:100, colors:{}, visible:true, deleted:false, solo:false };
                    const node = { id, layer, index:i, context, contextName, ty:layer.ty, typeName:tyNames[layer.ty]||"unknown", ind:layer.ind!==undefined?layer.ind:i, parentInd:layer.parent!==undefined?layer.parent:null, parentId:null, childIds:[], mattePairId:null, mattedById:null, precompAssetId:(layer.ty===0&&layer.refId)?layer.refId:null, precompChildIds:[], ip:layer.ip!==undefined?layer.ip:0, op:layer.op!==undefined?layer.op:(originalData.op||0), isHidden:layer.hd===true, isTrackMatte:layer.td!==undefined&&layer.td!==0, isEmpty:false, isNull:layer.ty===3, isSolid:layer.ty===1, category:"editable" };
                    node.isEmpty = isHiddenOrEmpty(layer);
                    if (node.isEmpty) node.category="empty"; else if (layer.ty===2||layer.ty===4||layer.ty===5) node.category="editable"; else node.category="structural";
                    layerGraph.nodes[id] = node;
                    if (layer.ind!==undefined) layerGraph.byInd[context][layer.ind] = id;
                }); return ids;
            }
            if (originalData.layers) layerGraph.roots = createNodes(originalData.layers, 'main', 'main', 'Main Composition');
            if (originalData.assets) { originalData.assets.forEach(asset => { if (asset.layers) layerGraph.assetRoots[asset.id] = createNodes(asset.layers, `asset_${asset.id}`, asset.id, `Asset: ${asset.id}`); }); }
            for (const node of Object.values(layerGraph.nodes)) {
                if (node.parentInd!==null) { const indMap=layerGraph.byInd[node.context]; if(indMap&&indMap[node.parentInd]!==undefined){node.parentId=indMap[node.parentInd];layerGraph.nodes[node.parentId].childIds.push(node.id);} }
            }
            function resolveMattes(layerIds) { for(let i=0;i<layerIds.length;i++){const node=layerGraph.nodes[layerIds[i]];if(node.layer.tt!==undefined&&i>0){const matteNode=layerGraph.nodes[layerIds[i-1]];if(matteNode&&matteNode.isTrackMatte){node.mattedById=matteNode.id;matteNode.mattePairId=node.id;}}}}
            resolveMattes(layerGraph.roots);
            for (const ids of Object.values(layerGraph.assetRoots)) resolveMattes(ids);
            for (const node of Object.values(layerGraph.nodes)) { if(node.precompAssetId&&layerGraph.assetRoots[node.precompAssetId]) node.precompChildIds=layerGraph.assetRoots[node.precompAssetId]; }
            for (const node of Object.values(layerGraph.nodes)) { const item={id:node.id,layer:node.layer,index:node.index,contextName:node.contextName}; if(node.category==="empty") emptyList.push(item); else if(node.category==="editable") editableList.push(item); else structuralList.push(item); }
        }

        // ===== SECTION 7: DESIGN TOKEN EXTRACTION =====
        function extractDesignTokens(lottieData) {
            const tokens = [];
            function walkShapes(shapes, basePath, layerId, layerName) {
                if (!shapes || !Array.isArray(shapes)) return;
                shapes.forEach((shape, i) => {
                    const sp = `${basePath}[${i}]`;
                    if (shape.ty==='gr'&&shape.it) walkShapes(shape.it, `${sp}.it`, layerId, layerName);
                    else if ((shape.ty==='fl'||shape.ty==='st')&&shape.c&&shape.c.k!==undefined) {
                        let hex='#000000'; const ck=shape.c.k;
                        if(typeof ck[0]==='number') hex=rgbToHex(ck);
                        else if(Array.isArray(ck)&&ck.length>0&&ck[0].s) hex=rgbToHex(ck[0].s);
                        const colorName=shape.nm||(shape.ty==='fl'?'Fill':'Stroke');
                        tokens.push({ type:'color', value:hex, path:`${sp}.c.k`, layerId, contextLabel:`${layerName} → ${colorName}`, layerName });
                    }
                });
            }
            function walkLayer(layer, layerPath, layerId, contextName) {
                const layerName=layer.nm||'Unnamed';
                if(layer.ty===4&&layer.shapes) walkShapes(layer.shapes, `${layerPath}.shapes`, layerId, layerName);
                else if(layer.ty===2&&layer.refId) tokens.push({type:'image',value:layer.refId,path:layerPath,layerId,contextLabel:contextName?`${contextName} / ${layerName}`:layerName,layerName});
                else if(layer.ty===5){try{const t=layer.t&&layer.t.d&&layer.t.d.k&&layer.t.d.k[0]&&layer.t.d.k[0].s&&layer.t.d.k[0].s.t;if(t)tokens.push({type:'text',value:t,path:`${layerPath}.t.d.k[0].s.t`,layerId,contextLabel:layerName,layerName});}catch(e){}}
            }
            if(lottieData.layers) lottieData.layers.forEach((layer,i)=>walkLayer(layer,`layers[${i}]`,`main__${i}`,null));
            if(lottieData.assets) lottieData.assets.forEach((asset,ai)=>{ if(asset.layers){const assetName=asset.nm||asset.id||`Asset ${ai}`;asset.layers.forEach((layer,li)=>walkLayer(layer,`assets[${ai}].layers[${li}]`,`asset_${asset.id}__${li}`,assetName));}});
            return tokens;
        }

        function getUniqueColorTokens(tokens) {
            const colorTokens = tokens.filter(t => t.type === 'color');
            const byHex = {};
            colorTokens.forEach(t => { const effectiveHex=tokenDiffMap[t.path]||t.value; if(!byHex[effectiveHex]) byHex[effectiveHex]={hex:effectiveHex,count:0,tokens:[]}; byHex[effectiveHex].count++; byHex[effectiveHex].tokens.push(t); });
            return Object.values(byHex).sort((a,b) => { const satA=getSaturation(a.hex),satB=getSaturation(b.hex); if(satA<0.08&&satB>=0.08)return 1; if(satB<0.08&&satA>=0.08)return -1; if(satA<0.08&&satB<0.08)return getLightness(b.hex)-getLightness(a.hex); return getHue(a.hex)-getHue(b.hex); });
        }

        function applyColorTokenToData(data, pathStr, newHex) {
            const colorVal = hexToRgb(newHex); const target = getByPath(data, pathStr);
            if (target===undefined||target===null) return;
            if (typeof target[0]==='number') setByPath(data, pathStr, colorVal);
            else if (Array.isArray(target)) { target.forEach(kf => { if(kf.s) kf.s=colorVal.slice(); if(kf.e) kf.e=colorVal.slice(); }); }
        }

        // ===== SECTION 8: SIDEBAR RENDERING =====
        function createLayerHTML(item, isEmptyContext=false) {
            const { id, layer, contextName } = item;
            const indexDisplay = item.index + 1;
            const node = layerGraph.nodes[id];
            const totalFrames = originalData ? (originalData.op || 0) : 0;
            const ip = node ? node.ip : 0; const op = node ? node.op : totalFrames;
            const notVisibleAtStart = ip > 0;
            const coversFullRange = (ip <= 0 && op >= totalFrames);
            let frameRangeHTML = '';
            if (!coversFullRange && totalFrames > 0) {
                const warnStyle = notVisibleAtStart ? `color:var(--accent-orange);font-weight:700;` : `color:var(--text-3);`;
                frameRangeHTML = `<span style="font-size:9px;${warnStyle}margin-left:4px;white-space:nowrap;" title="Visible frames: ${Math.round(ip)}-${Math.round(op)}">${notVisibleAtStart?'⚠ ':''}${Math.round(ip)}-${Math.round(op)}f</span>`;
            }

            const itemDiv = document.createElement('div');
            itemDiv.className = 'layer-item';

            if (layer.ty===2 && layer.refId) {

                if (imageAssetOverrides[layer.refId]) src = imageAssetOverrides[layer.refId].base64;
                else if (imgAsset && imgAsset.p) src = imgAsset.p.startsWith('data:image') ? imgAsset.p : ((imgAsset.u||'')+imgAsset.p);
                if (src) thumbHTML = `<div class="layer-thumb"><img src="${src}" style="width:100%;height:100%;object-fit:cover;"></div>`;
            } else if (layer.ty===4 && !isEmptyContext) {
                const layerColorTokens = designTokens.filter(t => t.type==='color' && t.layerId===id);
                if (layerColorTokens.length > 0) {
                    const uniqueHexes = [...new Set(layerColorTokens.map(t => tokenDiffMap[t.path]||t.value))].slice(0,4);
                    let dots = uniqueHexes.map(hex => `<span style="width:8px;height:8px;background:${hex};border-radius:50%;border:1px solid rgba(0,0,0,0.1);margin:1px;display:inline-block;"></span>`).join('');
                    thumbHTML = `<div class="layer-thumb" style="flex-wrap:wrap;padding:2px;">${dots}</div>`;
                }
            }

            headerDiv.innerHTML = `
                <div class="layer-name-wrapper">
                    ${thumbHTML}
                    <div class="layer-name-col">
                        <div class="layer-name">${indexDisplay}. ${layer.nm||'Unnamed'}${frameRangeHTML}</div>
                        <div class="layer-context">${contextName}</div>
                    </div>
                </div>
                <div class="layer-actions">
                    <button class="action-btn solo-btn" data-id="${id}" title="Solo Layer" style="color:${layerMods[id].solo?'var(--accent-orange)':''}">${ICONS.solo}</button>
                    <button class="action-btn toggle-vis" data-id="${id}" title="Toggle Visibility">${ICONS.eyeOpen}</button>

                </div>`;

            headerDiv.addEventListener('click', (e) => {
                const btn = e.target.closest('.action-btn');
                if (btn) {
                    e.stopPropagation(); const targetId = btn.getAttribute('data-id');
                    if (btn.classList.contains('toggle-vis')) {
                        pushUndoState(); layerMods[targetId].visible = !layerMods[targetId].visible;
                        btn.innerHTML = layerMods[targetId].visible ? ICONS.eyeOpen : ICONS.eyeClosed;
                    } else if (btn.classList.contains('delete-btn')) {

                        if (layerMods[targetId].deleted) itemDiv.classList.remove('expanded');
                    } else if (btn.classList.contains('solo-btn')) {
                        pushUndoState(); layerMods[targetId].solo = !layerMods[targetId].solo;
                        btn.style.color = layerMods[targetId].solo ? 'var(--accent-orange)' : '';
                    }
                    applyModificationsAndRender();
                } else {
                    if (layerMods[id].deleted) return;

                }
            });

            const bodyDiv = document.createElement('div'); bodyDiv.className = 'layer-body';
            let controlsHTML = `
                <div class="controls-grid">
                    <div class="control-row"><label>X</label><input type="number" value="${layerMods[id].dx}" data-id="${id}" data-type="pos" data-axis="dx"></div>
                    <div class="control-row"><label>Y</label><input type="number" value="${layerMods[id].dy}" data-id="${id}" data-type="pos" data-axis="dy"></div>
                    <div class="control-row"><label>W</label><input type="number" value="${layerMods[id].sx}" step="0.1" data-id="${id}" data-type="scale" data-axis="sx"></div>
                    <div class="control-row"><label>H</label><input type="number" value="${layerMods[id].sy}" step="0.1" data-id="${id}" data-type="scale" data-axis="sy"></div>
                    <div class="control-row" style="grid-column:span 2;"><label>O%</label><input type="number" value="${layerMods[id].op}" min="0" max="100" step="1" data-id="${id}" data-type="opacity"></div>`;

            if (layer.ty===2 && layer.refId) {
                controlsHTML += `<div class="color-group-title">Image Reference</div>
                    <div class="control-row" style="grid-column:span 2;padding:0;background:transparent;border:none;margin-bottom:4px;">
                        <div class="image-replace-wrap"><span class="image-btn">Replace Image</span><input type="file" accept="image/png,image/jpeg,image/webp" data-refid="${layer.refId}" class="image-replace-input"></div>
                    </div>`;
            }

            const layerColorTokens = designTokens.filter(t => t.type==='color' && t.layerId===id);
            if (layerColorTokens.length > 0) {
                controlsHTML += `<div class="color-group-title">Vector Colors</div>`;
                layerColorTokens.forEach(t => {
                    const currentHex = tokenDiffMap[t.path] || t.value;
                    const shortName = t.contextLabel.split(' → ').pop();
                    controlsHTML += `<div class="color-row"><label title="${t.contextLabel}">${shortName}</label><input type="color" value="${currentHex}" data-type="token-color" data-token-path="${t.path}"></div>`;
                });
            }
            bodyDiv.innerHTML = controlsHTML + `</div>`;
            itemDiv.appendChild(headerDiv); itemDiv.appendChild(bodyDiv);
            return itemDiv;
        }

        // ===== TAB SWITCHING =====
