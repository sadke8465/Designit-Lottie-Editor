        document.getElementById('canvas-w').addEventListener('input', () => { calculateBaseScale(); applyModificationsAndRender(); });
        document.getElementById('canvas-h').addEventListener('input', () => { calculateBaseScale(); applyModificationsAndRender(); });
        document.getElementById('play-speed').addEventListener('input', function(e) { if (animInstance) animInstance.setSpeed(parseFloat(e.target.value) || 1.0); });

        // ===== SECTION 5: LAYER CLASSIFICATION =====
        function isHiddenOrEmpty(layer) {
            if (layer.hd === true) return true;
            if (layer.td !== undefined && layer.td !== 0) return true;
            if (layer.ty === 3) return true;
            if (layer.ty === 1) return true;
            if (layer.ty === 4) {
                function hasFillOrStroke(items) {
                    if (!items || !Array.isArray(items)) return false;
                    for (let i = 0; i < items.length; i++) {
                        const it = items[i];
                        if (['fl', 'st', 'gf', 'gs'].includes(it.ty)) return true;
                        if (it.ty === 'gr' && it.it) { if (hasFillOrStroke(it.it)) return true; }
                    }
                    return false;
                }
                if (!hasFillOrStroke(layer.shapes)) return true;
            }
            return false;
        }

        function extractColors(shapes, basePath = "shapes") {
            let extracted = []; if (!shapes) return extracted;
            shapes.forEach((it, i) => {
                const pathStr = `${basePath}.${i}`;
                if (it.ty === 'gr' && it.it) extracted = extracted.concat(extractColors(it.it, `${pathStr}.it`));
                else if ((it.ty === 'fl' || it.ty === 'st') && it.c && it.c.k) {
                    let baseColor = [0,0,0,1]; if (typeof it.c.k[0] === 'number') baseColor = it.c.k; else if (it.c.k[0] && it.c.k[0].s) baseColor = it.c.k[0].s;
                    extracted.push({ path: pathStr, hex: rgbToHex(baseColor), name: it.nm || (it.ty==='fl'?'Fill':'Stroke') });
                }
            }); return extracted;
        }

        function buildLayerGraph() {
            layerGraph = { nodes: {}, roots: [], assetRoots: {}, byInd: {} };
            editableList = []; structuralList = []; emptyList = [];
            const tyNames = { 0:"precomp", 1:"solid", 2:"image", 3:"null", 4:"shape", 5:"text" };

            function createNodes(layers, prefix, context, contextName) {
                layerGraph.byInd[context] = {};
                const ids = [];
                layers.forEach((layer, i) => {
                    const id = `${prefix}__${i}`;
                    ids.push(id);
                    if (!layerMods[id]) {
                        layerMods[id] = { dx:0, dy:0, sx:1, sy:1, op:100, colors:{}, visible:true, deleted:false, solo:false };
                    }
                    const node = {
                        id, layer, index: i, context, contextName,
                        ty: layer.ty, typeName: tyNames[layer.ty] || "unknown",
                        ind: layer.ind !== undefined ? layer.ind : i,
                        parentInd: layer.parent !== undefined ? layer.parent : null,
                        parentId: null, childIds: [],
                        mattePairId: null, mattedById: null,
                        precompAssetId: (layer.ty === 0 && layer.refId) ? layer.refId : null,
                        precompChildIds: [],
                        ip: layer.ip !== undefined ? layer.ip : 0,
                        op: layer.op !== undefined ? layer.op : (originalData.op || 0),
                        isHidden: layer.hd === true,
                        isTrackMatte: layer.td !== undefined && layer.td !== 0,
                        isEmpty: false, isNull: layer.ty === 3, isSolid: layer.ty === 1,
                        category: "editable"
                    };
                    node.isEmpty = isHiddenOrEmpty(layer);
                    if (node.isEmpty) node.category = "empty";
                    else if (layer.ty === 2 || layer.ty === 4 || layer.ty === 5) node.category = "editable";
                    else node.category = "structural";

                    layerGraph.nodes[id] = node;
                    if (layer.ind !== undefined) layerGraph.byInd[context][layer.ind] = id;
                });
                return ids;
            }

            if (originalData.layers) {
                layerGraph.roots = createNodes(originalData.layers, 'main', 'main', 'Main Composition');
            }
            if (originalData.assets) {
                originalData.assets.forEach(asset => {
                    if (asset.layers) {
                        layerGraph.assetRoots[asset.id] = createNodes(asset.layers, `asset_${asset.id}`, asset.id, `Asset: ${asset.id}`);
                    }
                });
            }

            for (const node of Object.values(layerGraph.nodes)) {
                if (node.parentInd !== null) {
                    const indMap = layerGraph.byInd[node.context];
                    if (indMap && indMap[node.parentInd] !== undefined) {
                        node.parentId = indMap[node.parentInd];
                        layerGraph.nodes[node.parentId].childIds.push(node.id);
                    }
                }
            }
            function resolveMattes(layerIds) {
                for (let i = 0; i < layerIds.length; i++) {
                    const node = layerGraph.nodes[layerIds[i]];
                    if (node.layer.tt !== undefined && i > 0) {
                        const matteNode = layerGraph.nodes[layerIds[i - 1]];
                        if (matteNode && matteNode.isTrackMatte) {
                            node.mattedById = matteNode.id;
                            matteNode.mattePairId = node.id;
                        }
                    }
                }
            }
            resolveMattes(layerGraph.roots);
            for (const ids of Object.values(layerGraph.assetRoots)) resolveMattes(ids);

            for (const node of Object.values(layerGraph.nodes)) {
                if (node.precompAssetId && layerGraph.assetRoots[node.precompAssetId]) {
                    node.precompChildIds = layerGraph.assetRoots[node.precompAssetId];
                }
            }

            for (const node of Object.values(layerGraph.nodes)) {
                const item = { id: node.id, layer: node.layer, index: node.index, contextName: node.contextName };
                if (node.category === "empty") emptyList.push(item);
                else if (node.category === "editable") editableList.push(item);
                else structuralList.push(item);
            }
        }

        // ===== SECTION 5b: DESIGN TOKEN EXTRACTION =====

        /**
         * Walk the entire Lottie tree (main + all asset layers, recursively) and
         * return a flat array of token objects.  Each token stores:
         *   - path: absolute JSON path from root, e.g. "assets[2].layers[0].shapes[1].it[3].c.k"
         *   - type: 'color' | 'image' | 'text'
         *   - value: hex string / assetId / text string
         *   - layerId: graph node id for canvas highlighting
         *   - contextLabel: human-readable "Button Background → Fill"
         *   - layerName: nearest named parent layer
         */
        function extractDesignTokens(lottieData) {
            const tokens = [];

            function walkShapes(shapes, basePath, layerId, layerName) {
                if (!shapes || !Array.isArray(shapes)) return;
                shapes.forEach((shape, i) => {
                    const sp = `${basePath}[${i}]`;
                    if (shape.ty === 'gr' && shape.it) {
                        walkShapes(shape.it, `${sp}.it`, layerId, layerName);
                    } else if ((shape.ty === 'fl' || shape.ty === 'st') && shape.c && shape.c.k !== undefined) {
                        let hex = '#000000';
                        const ck = shape.c.k;
                        if (typeof ck[0] === 'number') {
                            hex = rgbToHex(ck);
                        } else if (Array.isArray(ck) && ck.length > 0 && ck[0].s) {
                            hex = rgbToHex(ck[0].s);
                        }
                        const colorName = shape.nm || (shape.ty === 'fl' ? 'Fill' : 'Stroke');
                        tokens.push({
                            type: 'color',
                            value: hex,
                            path: `${sp}.c.k`,
                            layerId,
                            contextLabel: `${layerName} → ${colorName}`,
                            layerName
                        });
                    }
                });
            }

            function walkLayer(layer, layerPath, layerId, contextName) {
                const layerName = layer.nm || 'Unnamed';
                const contextLabel = contextName ? `${contextName} / ${layerName}` : layerName;
                if (layer.ty === 4 && layer.shapes) {
                    walkShapes(layer.shapes, `${layerPath}.shapes`, layerId, layerName);
                } else if (layer.ty === 2 && layer.refId) {
                    tokens.push({ type: 'image', value: layer.refId, path: layerPath, layerId, contextLabel, layerName });
                } else if (layer.ty === 5) {
                    try {
                        const t = layer.t && layer.t.d && layer.t.d.k && layer.t.d.k[0] && layer.t.d.k[0].s && layer.t.d.k[0].s.t;
                        if (t) tokens.push({ type: 'text', value: t, path: `${layerPath}.t.d.k[0].s.t`, layerId, contextLabel, layerName });
                    } catch(e) {}
                }
            }

            if (lottieData.layers) {
                lottieData.layers.forEach((layer, i) => {
                    walkLayer(layer, `layers[${i}]`, `main__${i}`, null);
                });
            }
            if (lottieData.assets) {
                lottieData.assets.forEach((asset, ai) => {
                    if (asset.layers) {
                        const assetName = asset.nm || asset.id || `Asset ${ai}`;
                        asset.layers.forEach((layer, li) => {
                            walkLayer(layer, `assets[${ai}].layers[${li}]`, `asset_${asset.id}__${li}`, assetName);
                        });
                    }
                });
            }
            return tokens;
        }

        /**
         * Group color tokens by current effective hex, deduplicate, sort by hue.
         * Returns [{ hex, count, tokens[], originalHex }]
         */
        function getUniqueColorTokens(tokens) {
            const colorTokens = tokens.filter(t => t.type === 'color');
            const byHex = {};
            colorTokens.forEach(t => {
                // Effective hex: override from tokenDiffMap or original value
                const effectiveHex = tokenDiffMap[t.path] || t.value;
                if (!byHex[effectiveHex]) byHex[effectiveHex] = { hex: effectiveHex, count: 0, tokens: [] };
                byHex[effectiveHex].count++;
                byHex[effectiveHex].tokens.push(t);
            });
            // Sort: achromatic (low saturation) last, then by hue, then by lightness
            return Object.values(byHex).sort((a, b) => {
                const satA = getSaturation(a.hex), satB = getSaturation(b.hex);
                if (satA < 0.08 && satB >= 0.08) return 1;
                if (satB < 0.08 && satA >= 0.08) return -1;
                if (satA < 0.08 && satB < 0.08) return getLightness(b.hex) - getLightness(a.hex);
                return getHue(a.hex) - getHue(b.hex);
            });
        }

        /** Apply a single color token diff to a cloned lottie data object */
        function applyColorTokenToData(data, pathStr, newHex) {
            const colorVal = hexToRgb(newHex);
            const target = getByPath(data, pathStr);
            if (target === undefined || target === null) return;
            if (typeof target[0] === 'number') {
                setByPath(data, pathStr, colorVal);
            } else if (Array.isArray(target)) {
                // Keyframed color: update all keyframe s/e arrays
                target.forEach(kf => {
                    if (kf.s) kf.s = colorVal.slice();
                    if (kf.e) kf.e = colorVal.slice();
                });
            }
        }

        // ===== SECTION 6: SIDEBAR RENDERING =====
        function createLayerHTML(item, isEmptyContext = false) {
            const { id, layer, contextName } = item;
            const indexDisplay = item.index + 1;

            // Frame range badge
            const node = layerGraph.nodes[id];
            const totalFrames = originalData ? (originalData.op || 0) : 0;
            const ip = node ? node.ip : 0;
            const op = node ? node.op : totalFrames;
            const notVisibleAtStart = ip > 0;
            const coversFullRange = (ip <= 0 && op >= totalFrames);
            let frameRangeHTML = '';
            if (!coversFullRange && totalFrames > 0) {
                const warnColor = notVisibleAtStart ? 'color: var(--solo); font-weight: 700;' : 'color: var(--text-muted);';
                frameRangeHTML = `<span style="font-size: 9px; ${warnColor} margin-left: 6px; white-space: nowrap;" title="Visible frames: ${Math.round(ip)}-${Math.round(op)}${notVisibleAtStart ? ' (not visible at frame 0)' : ''}">${notVisibleAtStart ? '&#9888; ' : ''}${Math.round(ip)}-${Math.round(op)}f</span>`;
            }

            const itemDiv = document.createElement('div');
            itemDiv.className = 'layer-item'; itemDiv.setAttribute('data-item-id', id);
            itemDiv.addEventListener('mouseenter', () => highlightLayer(id));
            itemDiv.addEventListener('mouseleave', () => highlightLayer(null));

            const headerDiv = document.createElement('div'); headerDiv.className = 'layer-header';

            let iconStr = layer.ty === 2 ? ICONS.image : (layer.ty === 4 ? ICONS.shape : ICONS.folder);
            if (isEmptyContext) iconStr = ICONS.empty;

            let previewHTML = `<div style="display:flex; align-items:center; justify-content:center; width: 28px; height: 28px; background: #f0f0f4; border-radius: 6px; margin-right: 10px; border: 1px solid #e2e2e8; flex-shrink: 0;">${iconStr}</div>`;

            if (layer.ty === 2 && layer.refId) {
                let src = "";
                let imgAsset = originalData.assets?.find(a => a.id === layer.refId);
                if (imageAssetOverrides[layer.refId]) { src = imageAssetOverrides[layer.refId].base64; }
                else if (imgAsset && imgAsset.p) { src = imgAsset.p.startsWith('data:image') ? imgAsset.p : ((imgAsset.u || '') + imgAsset.p); }

                if (src) { previewHTML = `<img src="${src}" style="width: 28px; height: 28px; object-fit: cover; border-radius: 6px; border: 1px solid #e2e2e8; margin-right: 10px; background: #fff; flex-shrink: 0;">`; }
            } else if (layer.ty === 4 && !isEmptyContext) {
                // Use designTokens for color dots (respects tokenDiffMap overrides)
                const layerColorTokens = designTokens.filter(t => t.type === 'color' && t.layerId === id);
                if (layerColorTokens.length > 0) {
                    const uniqueHexes = [...new Set(layerColorTokens.map(t => tokenDiffMap[t.path] || t.value))].slice(0, 4);
                    let dots = uniqueHexes.map(hex => `<span style="width: 8px; height: 8px; background: ${hex}; border-radius: 50%; border: 1px solid rgba(0,0,0,0.1); margin: 1px;"></span>`).join('');
                    previewHTML = `<div style="display:flex; flex-wrap: wrap; width: 28px; height: 28px; align-items: center; justify-content: center; background: #f9f9fb; border-radius: 6px; border: 1px solid #e2e2e8; margin-right: 10px; flex-shrink: 0;">${dots}</div>`;
                }
            }

            headerDiv.innerHTML = `
                <div class="layer-name-wrapper" style="flex-direction: row; align-items: center;">
                    ${previewHTML}
                    <div style="display:flex; flex-direction: column; overflow: hidden;">
                        <div class="layer-name">${indexDisplay}. ${layer.nm || 'Unnamed'}${frameRangeHTML}</div>
                        <div class="layer-context">${contextName}</div>
                    </div>
                </div>
                <div class="layer-actions">
                    <button class="action-btn solo-btn" data-id="${id}" title="Solo Layer" style="color: ${layerMods[id].solo ? 'var(--solo)' : ''}">${ICONS.solo}</button>
                    <button class="action-btn toggle-vis" data-id="${id}" title="Toggle Vis">${ICONS.eyeOpen}</button>
                    <button class="action-btn delete-btn" data-id="${id}" title="Delete">${ICONS.trash}</button>
                    <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                </div>`;

            headerDiv.addEventListener('click', (e) => {
                const btn = e.target.closest('.action-btn');
                if (btn) {
                    e.stopPropagation(); const targetId = btn.getAttribute('data-id');
                    if (btn.classList.contains('toggle-vis')) {
                        pushUndoState();
                        layerMods[targetId].visible = !layerMods[targetId].visible;
                        btn.innerHTML = layerMods[targetId].visible ? ICONS.eyeOpen : ICONS.eyeClosed;
                    } else if (btn.classList.contains('delete-btn')) {
                        pushUndoState();
                        layerMods[targetId].deleted = !layerMods[targetId].deleted;
                        btn.innerHTML = layerMods[targetId].deleted ? ICONS.restore : ICONS.trash;
                        itemDiv.classList.toggle('deleted-layer');
                        itemDiv.querySelector('.layer-name').style.textDecoration = layerMods[targetId].deleted ? 'line-through' : 'none';
                        if(layerMods[targetId].deleted) itemDiv.classList.remove('expanded');
                    } else if (btn.classList.contains('solo-btn')) {
                        pushUndoState();
                        layerMods[targetId].solo = !layerMods[targetId].solo;
                        btn.style.color = layerMods[targetId].solo ? 'var(--solo)' : 'var(--text-muted)';
                    }
                    applyModificationsAndRender();
                } else {
                    if (layerMods[id].deleted) return;
                    if (!itemDiv.classList.contains('expanded')) selectLayer(id);
                    else itemDiv.classList.remove('expanded');
                }
            });

            const bodyDiv = document.createElement('div'); bodyDiv.className = 'layer-body';
            let controlsHTML = `
                <div class="controls-grid">
                    <div class="control-row"><label>X</label><input type="number" value="${layerMods[id].dx}" data-id="${id}" data-type="pos" data-axis="dx"></div>
                    <div class="control-row"><label>Y</label><input type="number" value="${layerMods[id].dy}" data-id="${id}" data-type="pos" data-axis="dy"></div>
                    <div class="control-row"><label>W</label><input type="number" value="${layerMods[id].sx}" step="0.1" data-id="${id}" data-type="scale" data-axis="sx"></div>
                    <div class="control-row"><label>H</label><input type="number" value="${layerMods[id].sy}" step="0.1" data-id="${id}" data-type="scale" data-axis="sy"></div>
                    <div class="control-row" style="grid-column: span 2;"><label>O %</label><input type="number" value="${layerMods[id].op}" min="0" max="100" step="1" data-id="${id}" data-type="opacity"></div>
            `;

            if (layer.ty === 2 && layer.refId) {
                controlsHTML += `<div class="color-group-title">Image Asset Reference</div>`;
                controlsHTML += `
                    <div class="control-row" style="grid-column: span 2; padding: 0; background: transparent; border: none; margin-bottom: 4px;">
                        <div class="image-replace-wrap">
                            <span class="image-btn">Replace Image Link</span>
                            <input type="file" accept="image/png, image/jpeg, image/webp" data-refid="${layer.refId}" class="image-replace-input">
                        </div>
                    </div>`;
            }

            // Use designTokens for color pickers — writes to tokenDiffMap (same as Colors tab)
            const layerColorTokens = designTokens.filter(t => t.type === 'color' && t.layerId === id);
            if (layerColorTokens.length > 0) {
                controlsHTML += `<div class="color-group-title">Vector Colors</div>`;
                layerColorTokens.forEach(t => {
                    const currentHex = tokenDiffMap[t.path] || t.value;
                    const shortName = t.contextLabel.split(' → ').pop();
                    controlsHTML += `<div class="color-row"><label title="${t.contextLabel}">${shortName}</label><input type="color" value="${currentHex}" data-type="token-color" data-token-path="${t.path}"></div>`;
                });
            }
            bodyDiv.innerHTML = controlsHTML + `</div>`;
            itemDiv.appendChild(headerDiv); itemDiv.appendChild(bodyDiv);
            return itemDiv;
        }

        // ===== TAB SWITCHING LOGIC =====

        function switchTab(tab) {
            activeTab = tab;
            renderSidebarContent();
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-tab') === tab);
            });
        }

        /** Main entry point — renders the tab switcher + active tab content */
        function renderTreeSidebar() {
            const listContainer = document.getElementById('layer-list');
            listContainer.innerHTML = '';
            listContainer._listenersAttached = false;

            if (!originalData) {
                listContainer.innerHTML = '<div class="empty-state">Load a Lottie file to begin.</div>';
                return;
            }

            // ---- Tab Switcher ----
            const colorCount = getUniqueColorTokens(designTokens).length;
            const imageTokens = designTokens.filter(t => t.type === 'image');
            // Count unique image asset IDs (not counting duplicates of same refId)
            const imageAssetCount = new Set(imageTokens.map(t => t.value)).size;

            const tabBar = document.createElement('div');
            tabBar.className = 'tab-switcher';
            tabBar.innerHTML = `
                <button class="tab-btn${activeTab==='colors'?' active':''}" data-tab="colors">Colors <span class="tab-badge">${colorCount}</span></button>
                <button class="tab-btn${activeTab==='images'?' active':''}" data-tab="images">Images <span class="tab-badge">${imageAssetCount}</span></button>
                <button class="tab-btn${activeTab==='advanced'?' active':''}" data-tab="advanced">Advanced</button>`;
            tabBar.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => switchTab(btn.getAttribute('data-tab')));
            });
            listContainer.appendChild(tabBar);

            renderSidebarContent();
        }

        /** Renders the content area under the tab bar based on activeTab */
        function renderSidebarContent() {
            // Remove old content but keep the tab bar
            const listContainer = document.getElementById('layer-list');
            const tabBar = listContainer.querySelector('.tab-switcher');
            listContainer.innerHTML = '';
            if (tabBar) listContainer.appendChild(tabBar);

            if (activeTab === 'colors') renderColorsTab(listContainer);
            else if (activeTab === 'images') renderImagesTab(listContainer);
            else renderAdvancedTab(listContainer);
        }

        // ===== COLORS TAB =====
        function renderColorsTab(container) {
            const wrap = document.createElement('div');
            wrap.style.cssText = 'padding: 16px;';

            const uniqueColors = getUniqueColorTokens(designTokens);
            if (uniqueColors.length === 0) {
                wrap.innerHTML = '<div class="tab-empty-state">No vector colors found in this file.</div>';
                container.appendChild(wrap);
                return;
            }

            // Heading
            const heading = document.createElement('div');
            heading.style.cssText = 'display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;';
            heading.innerHTML = `<div class="color-section-label" style="margin:0;">${uniqueColors.length} unique color${uniqueColors.length!==1?'s':''}</div>
                <div style="font-size:10px; color:var(--text-muted);">Click swatch to edit • hover to preview</div>`;
            wrap.appendChild(heading);

            uniqueColors.forEach(group => {
                const card = createColorTokenCard(group);
                wrap.appendChild(card);
            });

            container.appendChild(wrap);
        }

        function createColorTokenCard(group) {
            const card = document.createElement('div');
            card.className = 'color-token-card';
            card.setAttribute('data-group-hex', group.hex);

            const swatchWrap = document.createElement('div');
            swatchWrap.className = 'color-swatch-wrap';

            const swatch = document.createElement('input');
            swatch.type = 'color';
            swatch.className = 'color-swatch-large';
            swatch.value = group.hex;
            swatch.title = 'Change all instances of this color';
            swatchWrap.appendChild(swatch);

            const meta = document.createElement('div');
            meta.className = 'color-meta';
            const contextPreview = group.tokens.slice(0, 2).map(t => t.contextLabel).join(', ') + (group.tokens.length > 2 ? ` +${group.tokens.length-2} more` : '');
            meta.innerHTML = `
                <div class="color-hex-label">${group.hex}</div>
                <span class="color-usage-badge">Used ${group.count}×</span>
                <div class="color-context-list" title="${group.tokens.map(t=>t.contextLabel).join('\n')}">${contextPreview}</div>`;

            // "Edit individual" toggle
            const actionsDiv = document.createElement('div');
            actionsDiv.style.cssText = 'display:flex; flex-direction:column; gap:4px; align-items:flex-end;';

            if (group.count > 1) {
                const unlinkBtn = document.createElement('button');
                unlinkBtn.className = 'unlink-btn';
                unlinkBtn.textContent = 'Edit each';
                unlinkBtn.title = 'Edit each instance individually';
                unlinkBtn.style.display = 'block';
                let expanded = false;
                const individualWrap = document.createElement('div');
                individualWrap.style.display = 'none';

                unlinkBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    expanded = !expanded;
                    individualWrap.style.display = expanded ? 'block' : 'none';
                    unlinkBtn.textContent = expanded ? 'Collapse' : 'Edit each';
                });
                actionsDiv.appendChild(unlinkBtn);

                // Build individual color rows (inserted after card)
                group.tokens.forEach((token, ti) => {
                    const row = document.createElement('div');
                    row.className = 'single-color-row';
                    const indSwatch = document.createElement('input');
                    indSwatch.type = 'color';
                    indSwatch.className = 'single-color-swatch';
                    indSwatch.value = tokenDiffMap[token.path] || token.value;
                    indSwatch.title = token.contextLabel;
                    const lbl = document.createElement('span');
                    lbl.className = 'single-color-label';
                    lbl.textContent = token.contextLabel;
                    lbl.title = token.contextLabel;
                    row.appendChild(indSwatch);
                    row.appendChild(lbl);

                    indSwatch.addEventListener('input', (e) => {
                        e.stopPropagation();
                        pushUndoState();
                        tokenDiffMap[token.path] = e.target.value;
                        applyModificationsAndRender();
                        // update hex label on the parent card
                        // (don't rebuild full tab to avoid losing focus)
                    });
                    individualWrap.appendChild(row);
                });
                card.insertAdjacentElement('afterend', individualWrap);
                // Store reference so we can remove on rebuild
                card._individualWrap = individualWrap;
            }

            card.appendChild(swatchWrap);
            card.appendChild(meta);
            card.appendChild(actionsDiv);

            // ---- Hover → highlight all layers using this color ----
            card.addEventListener('mouseenter', () => {
                hoveredColorHex = group.hex;
                card.classList.add('token-highlighted');
                highlightColorTokens(group.hex);
            });
            card.addEventListener('mouseleave', () => {
                hoveredColorHex = null;
                card.classList.remove('token-highlighted');
                clearColorHighlight();
            });

            // ---- Input: change all tokens that share this hex ----
            swatch.addEventListener('input', (e) => {
                const newHex = e.target.value.toUpperCase();
                pushUndoState();
                // Apply to every token that currently matches this group's hex
                group.tokens.forEach(token => {
                    tokenDiffMap[token.path] = newHex;
                });
                // Update meta text immediately
                meta.querySelector('.color-hex-label').textContent = newHex;
                applyModificationsAndRender();
            });

            return card;
        }

        // ===== IMAGES TAB =====
        function renderImagesTab(container) {
            const wrap = document.createElement('div');
            wrap.style.cssText = 'padding: 16px;';

            if (!originalData || !originalData.assets) {
                wrap.innerHTML = '<div class="tab-empty-state">No image assets found.</div>';
                container.appendChild(wrap);
                return;
            }

            const imageAssets = originalData.assets.filter(a => !a.layers && (a.p || a.e));
            if (imageAssets.length === 0) {
                wrap.innerHTML = '<div class="tab-empty-state">No image assets found in this file.</div>';
                container.appendChild(wrap);
                return;
            }

            const heading = document.createElement('div');
            heading.style.cssText = 'margin-bottom:14px;';
            heading.innerHTML = `<div class="color-section-label" style="margin:0;">${imageAssets.length} image asset${imageAssets.length!==1?'s':''}</div>`;
            wrap.appendChild(heading);

            const grid = document.createElement('div');
            grid.className = 'image-grid';

            imageAssets.forEach(asset => {
                const card = document.createElement('div');
                card.className = 'image-thumb-card';

                let src = '';
                if (imageAssetOverrides[asset.id]) {
                    src = imageAssetOverrides[asset.id].base64;
                } else if (asset.p) {
                    src = asset.p.startsWith('data:image') ? asset.p : ((asset.u || '') + asset.p);
                }

                const imgEl = document.createElement(src ? 'img' : 'div');
                if (src) {
                    imgEl.className = 'image-thumb-img';
                    imgEl.src = src;
                    imgEl.alt = asset.id;
                } else {
                    imgEl.className = 'image-thumb-placeholder';
                    imgEl.innerHTML = '🖼';
                }

                const info = document.createElement('div');
                info.className = 'image-thumb-info';

                const assetName = asset.p ? asset.p.split('/').pop() : asset.id;
                info.innerHTML = `<div class="image-thumb-name" title="${assetName}">${assetName}</div>
                    <div class="image-thumb-id">${asset.id}</div>`;

                const replaceWrap = document.createElement('div');
                replaceWrap.className = 'image-replace-btn-wrap';

                const replacedBadge = document.createElement('div');
                replacedBadge.className = `image-replaced-badge${imageAssetOverrides[asset.id] ? ' visible' : ''}`;
                replacedBadge.textContent = imageAssetOverrides[asset.id] ? '✓ Replaced' : '';

                const fileInput = document.createElement('input');
                fileInput.type = 'file';
                fileInput.accept = 'image/png, image/jpeg, image/webp, image/gif, image/svg+xml';
                fileInput.addEventListener('change', function() {
                    const file = this.files[0];
                    if (!file) return;
                    const reader = new FileReader();
                    reader.onload = function(evt) {
                        pushUndoState();
                        imageAssetOverrides[asset.id] = { base64: evt.target.result, filename: file.name };
                        imageDataCache[asset.id] = evt.target.result;
                        applyModificationsAndRender();
                        // Update thumbnail in place
                        if (imgEl.tagName === 'IMG') { imgEl.src = evt.target.result; }
                        else {
                            const newImg = document.createElement('img');
                            newImg.className = 'image-thumb-img';
                            newImg.src = evt.target.result;
                            newImg.alt = asset.id;
                            imgEl.replaceWith(newImg);
                        }
                        replacedBadge.textContent = '✓ Replaced';
                        replacedBadge.classList.add('visible');
                    };
                    reader.readAsDataURL(file);
                });
                replaceWrap.appendChild(Object.assign(document.createElement('span'), { className: 'image-replace-btn', textContent: 'Replace Image' }));
                replaceWrap.appendChild(fileInput);
                info.appendChild(replaceWrap);
                info.appendChild(replacedBadge);

                card.appendChild(imgEl);
                card.appendChild(info);
                grid.appendChild(card);
            });

            wrap.appendChild(grid);
            container.appendChild(wrap);
        }

        // ===== ADVANCED TAB (existing layer tree) =====
        function renderAdvancedTab(container) {
            const wrap = document.createElement('div');
            wrap.style.cssText = 'padding: 20px; background: #fcfcfd;';

            // Search bar
            const searchWrap = document.createElement('div');
            searchWrap.style.cssText = 'position: sticky; top: 0; background: #fcfcfd; z-index: 5; padding-bottom: 12px;';
            searchWrap.innerHTML = `<input type="text" id="layer-search" placeholder="Search layers..." value="${searchFilter}" style="width:100%; padding:8px 12px; border:1px solid var(--border); border-radius:6px; font-size:13px; outline:none; background:var(--surface);">`;
            wrap.appendChild(searchWrap);

            const searchInput = searchWrap.querySelector('#layer-search');
            searchInput.addEventListener('input', (e) => {
                searchFilter = e.target.value;
                applySearchFilter();
            });
            if (searchFilter) {
                requestAnimationFrame(() => {
                    searchInput.focus();
                    searchInput.setSelectionRange(searchFilter.length, searchFilter.length);
                });
            }

            // Main composition header
            const mainHeader = document.createElement('div');
            mainHeader.className = 'list-section-header';
            mainHeader.innerHTML = `<span>Main Composition</span> <span class="layer-count-badge">${layerGraph.roots.length}</span>`;
            wrap.appendChild(mainHeader);

            // Render root-level layers (no parent)
            const mainRoots = layerGraph.roots.filter(id => {
                const node = layerGraph.nodes[id];
                return node && node.parentId === null;
            });
            mainRoots.forEach(id => renderTreeNode(id, wrap, 0));

            // Attach event delegation
            if (!wrap._listenersAttached) {
                attachTreeListeners(wrap);
                wrap._listenersAttached = true;
            }

            container.appendChild(wrap);

            if (searchFilter) applySearchFilter();
        }

        function renderTreeNode(nodeId, container, depth) {
            const node = layerGraph.nodes[nodeId];
            if (!node) return;

            const item = { id: node.id, layer: node.layer, index: node.index, contextName: node.contextName };
            const itemEl = createLayerHTML(item, node.category === 'empty');

            // Indent based on depth
            itemEl.style.marginLeft = `${depth * 16}px`;
            itemEl.style.width = `calc(100% - ${depth * 16}px)`;

            // Type badge for non-shape/image layers
            const nameEl = itemEl.querySelector('.layer-name');
            if (nameEl && node.typeName !== 'shape' && node.typeName !== 'image') {
                const badge = document.createElement('span');
                badge.style.cssText = 'font-size:8px; padding:1px 4px; border-radius:3px; margin-left:4px; background:#e8e8ec; color:#666;';
                badge.textContent = node.typeName;
                nameEl.appendChild(badge);
            }

            // Category indicator for non-editable layers
            if (node.category === 'structural' || node.category === 'empty') {
                itemEl.style.opacity = node.category === 'empty' ? '0.5' : '0.75';
                itemEl.style.borderStyle = 'dashed';
            }

            container.appendChild(itemEl);

            // Render parented children
            if (node.childIds.length > 0) {
                node.childIds.forEach(childId => renderTreeNode(childId, container, depth + 1));
            }

            // Render precomp contents
            if (node.precompChildIds.length > 0) {
                const precompWrap = document.createElement('div');
                precompWrap.className = 'precomp-subtree';
                precompWrap.style.cssText = `margin-left: ${(depth + 1) * 16}px; border-left: 2px solid var(--accent); padding-left: 6px; display: none;`;
                precompWrap.setAttribute('data-precomp-for', nodeId);

                const actionsDiv = itemEl.querySelector('.layer-actions');
                if (actionsDiv) {
                    const expandBtn = document.createElement('button');
                    expandBtn.className = 'action-btn';
                    expandBtn.innerHTML = ICONS.folder;
                    expandBtn.title = `Expand precomp (${node.precompChildIds.length} layers)`;
                    expandBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const hidden = precompWrap.style.display === 'none';
                        precompWrap.style.display = hidden ? 'block' : 'none';
                        expandBtn.style.color = hidden ? 'var(--accent)' : '';
                    });
                    actionsDiv.insertBefore(expandBtn, actionsDiv.firstChild);
                }

                const precompRoots = node.precompChildIds.filter(cid => {
                    const cn = layerGraph.nodes[cid];
                    return cn && cn.parentId === null;
                });
                precompRoots.forEach(cid => renderTreeNode(cid, precompWrap, 0));

                container.appendChild(precompWrap);
            }
        }

        function attachTreeListeners(listContainer) {
            listContainer.addEventListener('input', function(e) {
                if (e.target.tagName === 'INPUT' && e.target.type !== 'file') {
                    const id = e.target.getAttribute('data-id');
                    const type = e.target.getAttribute('data-type');
                    if (type === 'pos') {
                        layerMods[id][e.target.getAttribute('data-axis')] = parseFloat(e.target.value) || 0;
                        pushUndoStateDebounced();
                        scheduleRender();
                    } else if (type === 'scale') {
                        layerMods[id][e.target.getAttribute('data-axis')] = parseFloat(e.target.value) || 1.0;
                        pushUndoStateDebounced();
                        scheduleRender();
                    } else if (type === 'opacity') {
                        layerMods[id].op = Math.max(0, Math.min(100, parseFloat(e.target.value) || 0));
                        pushUndoStateDebounced();
                        applyCosmeticOpacity();
                    } else if (type === 'token-color') {
                        // Advanced tab color pickers — write to tokenDiffMap (same as Colors tab)
                        pushUndoState();
                        tokenDiffMap[e.target.getAttribute('data-token-path')] = e.target.value.toUpperCase();
                        applyModificationsAndRender();
                    }
                }
            });

            listContainer.addEventListener('change', function(e) {
                if (e.target.classList.contains('image-replace-input')) {
                    const refId = e.target.getAttribute('data-refid');
                    const file = e.target.files[0];
                    if (file) {
                        const reader = new FileReader();
                        reader.onload = function(evt) {
                            pushUndoState();
                            imageAssetOverrides[refId] = { base64: evt.target.result, filename: file.name };
                            imageDataCache[refId] = evt.target.result;
                            applyModificationsAndRender();
                            renderTreeSidebar();
                        };
                        reader.readAsDataURL(file);
                    }
                }
            });
        }

        function applySearchFilter() {
            const query = searchFilter.toLowerCase().trim();
            if (!query) {
                document.querySelectorAll('.layer-item, .precomp-subtree').forEach(el => { el.style.display = ''; });
                return;
            }

            document.querySelectorAll('.layer-item').forEach(el => { el.style.display = 'none'; });

            const matchingIds = new Set();
            for (const node of Object.values(layerGraph.nodes)) {
                const name = (node.layer.nm || '').toLowerCase();
                if (name.includes(query)) matchingIds.add(node.id);
            }

            matchingIds.forEach(id => {
                const el = document.querySelector(`.layer-item[data-item-id="${id}"]`);
                if (el) el.style.display = '';
            });

            // Show ancestors so the tree path is visible
            matchingIds.forEach(id => {
                let node = layerGraph.nodes[id];
                while (node && node.parentId) {
                    const parentEl = document.querySelector(`.layer-item[data-item-id="${node.parentId}"]`);
                    if (parentEl) parentEl.style.display = '';
                    node = layerGraph.nodes[node.parentId];
                }
                node = layerGraph.nodes[id];
                if (node && node.context !== 'main') {
                    for (const n of Object.values(layerGraph.nodes)) {
                        if (n.precompAssetId === node.context) {
                            const precompEl = document.querySelector(`.layer-item[data-item-id="${n.id}"]`);
                            if (precompEl) precompEl.style.display = '';
                            const subtree = document.querySelector(`[data-precomp-for="${n.id}"]`);
                            if (subtree) subtree.style.display = 'block';
                        }
                    }
                }
            });
        }

        // ===== SECTION 7: UNDO/REDO =====
        function captureState() {
            const imageKeys = {};
            for (const [k, v] of Object.entries(imageAssetOverrides)) {
                imageKeys[k] = { filename: v.filename };
                imageDataCache[k] = v.base64;
            }
            return {
                layerMods: JSON.parse(JSON.stringify(layerMods)),
                tokenDiffMap: JSON.parse(JSON.stringify(tokenDiffMap)),
                imageKeys: imageKeys
            };
        }

        function restoreState(snapshot) {
            layerMods = snapshot.layerMods;
            tokenDiffMap = snapshot.tokenDiffMap || {};
            imageAssetOverrides = {};
            for (const [k, meta] of Object.entries(snapshot.imageKeys)) {
                imageAssetOverrides[k] = { base64: imageDataCache[k], filename: meta.filename };
            }
        }

        function pushUndoState() {
            undoStack.push(captureState());
            if (undoStack.length > MAX_UNDO_STACK) undoStack.shift();
            redoStack = [];
        }

        function pushUndoStateDebounced() {
            if (!undoStatePending) {
                pushUndoState();
                undoStatePending = true;
            }
            clearTimeout(undoPushTimer);
            undoPushTimer = setTimeout(() => { undoStatePending = false; }, 600);
        }

        function undo() {
            if (undoStack.length === 0) return;
            redoStack.push(captureState());
            restoreState(undoStack.pop());
            renderTreeSidebar();
            applyModificationsAndRender();
        }

        function redo() {
            if (redoStack.length === 0) return;
            undoStack.push(captureState());
            restoreState(redoStack.pop());
            renderTreeSidebar();
            applyModificationsAndRender();
        }

        // ===== SECTION 8: SOLO & DEPENDENCY LOGIC =====
        function calculateSoloDependencies() {
            let anySolo = false;
            let soloContexts = {};
            let neededPrecomps = new Set();

            for (const [id, mod] of Object.entries(layerMods)) {
                if (mod.solo && !mod.deleted) {
                    anySolo = true;
                    const node = layerGraph.nodes[id];
                    if (!node) continue;
                    if (!soloContexts[node.context]) soloContexts[node.context] = new Set();
                    soloContexts[node.context].add(id);
                }
            }

            if (!anySolo) return { anySolo, soloContexts, neededPrecomps };

            // Trace upward from solo contexts to ensure parent precomps visible
            for (const contextKey of Object.keys(soloContexts)) {
                if (contextKey !== 'main') neededPrecomps.add(contextKey);
            }

            let changed = true;
            while (changed) {
                changed = false;
                for (const node of Object.values(layerGraph.nodes)) {
                    if (node.ty === 0 && node.precompAssetId && neededPrecomps.has(node.precompAssetId)) {
                        if (node.context !== 'main' && !neededPrecomps.has(node.context)) {
                            neededPrecomps.add(node.context);
                            changed = true;
                        }
                    }
                }
            }

            return { anySolo, soloContexts, neededPrecomps };
        }

        // ===== SECTION 9: MODIFICATION & RENDER PIPELINE =====
        function applyModsToArray(layersArray, prefix, anySolo, soloContexts, neededPrecomps) {
            let finalLayers = [];
            const contextKey = prefix === 'main' ? 'main' : prefix.replace('asset_', '');
            const contextHasSolo = soloContexts && soloContexts[contextKey];

            layersArray.forEach((layer, index) => {
                const id = `${prefix}__${index}`;
                const mod = layerMods[id];
                if (!mod || mod.deleted) return;

                // Solo visibility
                if (anySolo) {
                    if (contextHasSolo) {
                        if (mod.solo) { layer.hd = false; }
                        else if (layer.ty === 0 && layer.refId && neededPrecomps.has(layer.refId)) { layer.hd = false; }
                        else { layer.hd = true; }
                    } else if (neededPrecomps.has(contextKey)) {
                        if (!mod.visible) layer.hd = true;
                    } else {
                        if (!mod.visible) layer.hd = true;
                    }
                } else {
                    if (!mod.visible) layer.hd = true;
                }

                const ks = layer.ks;
                if (ks) {
                    const op = mod.op;
                    if (op !== 100 && ks.o) { const multiplier = op / 100; if (typeof ks.o.k === 'number') ks.o.k *= multiplier; else if (Array.isArray(ks.o.k)) { ks.o.k.forEach(kf => { if (kf.s) kf.s[0] *= multiplier; if (kf.e) kf.e[0] *= multiplier; }); } }
                    const dx = mod.dx; const dy = mod.dy;
                    if ((dx !== 0 || dy !== 0) && ks.p) { const isAnimated = ks.p.a === 1; if (!isAnimated && Array.isArray(ks.p.k)) { ks.p.k[0] += dx; ks.p.k[1] += dy; } else if (isAnimated && Array.isArray(ks.p.k)) { ks.p.k.forEach(kf => { if (kf.s) { kf.s[0] += dx; kf.s[1] += dy; } if (kf.e) { kf.e[0] += dx; kf.e[1] += dy; } }); } }
                    const sx = mod.sx; const sy = mod.sy;
                    if ((sx !== 1.0 || sy !== 1.0) && ks.s) { const isAnimated = ks.s.a === 1; if (!isAnimated && Array.isArray(ks.s.k)) { ks.s.k[0] *= sx; ks.s.k[1] *= sy; } else if (isAnimated && Array.isArray(ks.s.k)) { ks.s.k.forEach(kf => { if (kf.s) { kf.s[0] *= sx; kf.s[1] *= sy; } if (kf.e) { kf.e[0] *= sx; kf.e[1] *= sy; } }); } }
                }

                // Color modifications are now applied globally via tokenDiffMap in applyModificationsAndRender()
                finalLayers.push(layer);
            });
            return finalLayers;
        }

        function applyModificationsAndRender() {
            if (!originalData) return;
            modifiedData = JSON.parse(JSON.stringify(originalData));
            modifiedData.w = parseInt(document.getElementById('canvas-w').value) || modifiedData.w;
            modifiedData.h = parseInt(document.getElementById('canvas-h').value) || modifiedData.h;

            // Pass 1: Apply token color diffs (path-addressed, guaranteed byte-identical for untouched paths)
            for (const [pathStr, newHex] of Object.entries(tokenDiffMap)) {
                applyColorTokenToData(modifiedData, pathStr, newHex);
            }

            // Pass 2: Apply structural layer mods (position, scale, opacity, visibility, delete, solo)
            const { anySolo, soloContexts, neededPrecomps } = calculateSoloDependencies();

            if (modifiedData.layers) modifiedData.layers = applyModsToArray(modifiedData.layers, 'main', anySolo, soloContexts, neededPrecomps);
            if (modifiedData.assets) modifiedData.assets.forEach(asset => {
                if (asset.layers) asset.layers = applyModsToArray(asset.layers, `asset_${asset.id}`, anySolo, soloContexts, neededPrecomps);
            });

            if (modifiedData.assets && Object.keys(imageAssetOverrides).length > 0) {
                modifiedData.assets.forEach(asset => {
                    if (imageAssetOverrides[asset.id]) { asset.p = imageAssetOverrides[asset.id].base64; asset.u = ""; asset.e = 1; }
                });
            }
            renderAnimation();
        }

        function renderAnimation() {
            const container = document.getElementById('lottie-player'); container.innerHTML = '';
            let wasPaused = animInstance ? animInstance.isPaused : false;
            let currentFrame = animInstance ? animInstance.currentFrame : 0;
            let currentSpeed = parseFloat(document.getElementById('play-speed').value) || 1.0;

            if (animInstance) animInstance.destroy();
            animInstance = lottie.loadAnimation({ container: container, renderer: 'svg', loop: true, autoplay: false, animationData: JSON.parse(JSON.stringify(modifiedData)) });
            animInstance.setSpeed(currentSpeed);

            animInstance.addEventListener('DOMLoaded', () => {
                buildSvgLayerMap();
                applyCosmeticOpacity();
                updatePlayerSize(); const svgElement = container.querySelector('svg');
                if (svgElement) svgElement.setAttribute('preserveAspectRatio', 'xMidYMid meet');
                updateCanvasHighlights(); updateDynamicBBoxes();

                slider.max = animInstance.totalFrames; document.getElementById('total-frames').innerText = Math.round(animInstance.totalFrames);
                playPauseBtn.innerHTML = wasPaused ? ICONS.play : ICONS.pause;
                if (wasPaused) animInstance.goToAndStop(currentFrame, true); else animInstance.goToAndPlay(currentFrame, true);
            });
            animInstance.addEventListener('enterFrame', (e) => {
                slider.value = Math.round(e.currentTime); currentFrameEl.innerText = Math.round(e.currentTime);
                updateDynamicBBoxes();
                if (!frameHighlightTimer) {
                    frameHighlightTimer = setTimeout(() => {
                        updateActiveFrameHighlights(e.currentTime);
                        frameHighlightTimer = null;
                    }, 150);
                }
            });
        }

        function buildSvgLayerMap() {
            svgLayerMap = {};
            if (!animInstance || !animInstance.renderer || !animInstance.renderer.elements) {
                console.warn('Could not access lottie renderer elements for SVG mapping');
                return;
            }

            function mapElements(rendererElements, prefix) {
                if (!rendererElements) return;
                for (let i = 0; i < rendererElements.length; i++) {
                    const el = rendererElements[i];
                    if (!el) continue;
                    const id = `${prefix}__${i}`;
                    const svgNode = el.layerElement || el.baseElement || null;
                    if (svgNode) {
                        svgLayerMap[id] = svgNode;
                        svgNode.classList.add('lottie-layer', `lottie-layer-${id}`);
                    }
                    if (el.elements && el.data && el.data.refId) {
                        mapElements(el.elements, `asset_${el.data.refId}`);
                    }
                }
            }

            mapElements(animInstance.renderer.elements, 'main');
        }

        function scheduleRender() {
            if (renderDebounceId) cancelAnimationFrame(renderDebounceId);
            renderDebounceId = requestAnimationFrame(() => {
                renderDebounceId = null;
                applyModificationsAndRender();
            });
        }

        function applyCosmeticOpacity() {
            let styleEl = document.getElementById('cosmetic-overrides');
            if (!styleEl) {
                styleEl = document.createElement('style');
                styleEl.id = 'cosmetic-overrides';
                document.head.appendChild(styleEl);
            }
            let css = '';
            for (const [id, mod] of Object.entries(layerMods)) {
                if (mod.deleted) continue;
                if (mod.op !== 100) {
                    const escapedId = CSS.escape(id);
                    css += `.lottie-layer-${escapedId} { opacity: ${mod.op / 100} !important; }\n`;
                }
            }
            styleEl.textContent = css;
        }

        function buildExportData() {
            const exportData = JSON.parse(JSON.stringify(originalData));
            exportData.w = parseInt(document.getElementById('canvas-w').value) || exportData.w;
            exportData.h = parseInt(document.getElementById('canvas-h').value) || exportData.h;

            // Pass 1: Apply token color diffs (sparse, path-addressed)
            for (const [pathStr, newHex] of Object.entries(tokenDiffMap)) {
                applyColorTokenToData(exportData, pathStr, newHex);
            }

            // Pass 2: Structural layer mods (position, scale, opacity, visibility, delete)
            const { anySolo, soloContexts, neededPrecomps } = calculateSoloDependencies();

            if (exportData.layers) {
                exportData.layers = applyModsToArray(exportData.layers, 'main', anySolo, soloContexts, neededPrecomps);
            }
            if (exportData.assets) {
                exportData.assets.forEach(asset => {
                    if (asset.layers) {
                        asset.layers = applyModsToArray(asset.layers, `asset_${asset.id}`, anySolo, soloContexts, neededPrecomps);
                    }
                });
            }
            if (exportData.assets && Object.keys(imageAssetOverrides).length > 0) {
                exportData.assets.forEach(asset => {
                    if (imageAssetOverrides[asset.id]) {
                        asset.p = imageAssetOverrides[asset.id].base64;
                        asset.u = "";
                        asset.e = 1;
                    }
                });
            }
            // Strip cl properties defensively
            function stripCl(layers) { if (!layers) return; layers.forEach(l => delete l.cl); }
            stripCl(exportData.layers);
            if (exportData.assets) exportData.assets.forEach(a => { if (a.layers) stripCl(a.layers); });

            return exportData;
        }

        // ===== SECTION 10: EXPORT =====

        function getExportDiff() {
            const colorChanges = Object.keys(tokenDiffMap).length;
            const imageChanges = Object.keys(imageAssetOverrides).length;
            const deletedLayers = Object.values(layerMods).filter(m => m.deleted).length;
            const hiddenLayers = Object.values(layerMods).filter(m => !m.visible && !m.deleted).length;
            const transformChanges = Object.values(layerMods).filter(m => m.dx !== 0 || m.dy !== 0 || m.sx !== 1 || m.sy !== 1 || m.op !== 100).length;
            return { colorChanges, imageChanges, deletedLayers, hiddenLayers, transformChanges };
        }

        function showExportDiffDialog(onConfirm) {
            const diff = getExportDiff();
            const total = diff.colorChanges + diff.imageChanges + diff.deletedLayers + diff.hiddenLayers + diff.transformChanges;

            const overlay = document.createElement('div');
            overlay.className = 'diff-overlay';

            function row(label, count) {
                const cls = count > 0 ? 'diff-count' : 'diff-zero';
                return `<div class="diff-row"><span>${label}</span><span class="${cls}">${count > 0 ? count : '—'}</span></div>`;
            }

            overlay.innerHTML = `
                <div class="diff-dialog">
                    <h4>Export Summary</h4>
                    <p style="font-size:12px; color:var(--text-muted); margin:0 0 16px 0;">
                        ${total === 0 ? 'No changes made — file is identical to original.' : `${total} change${total!==1?'s':''} will be exported:`}
                    </p>
                    ${row('Color changes', diff.colorChanges)}
                    ${row('Image replacements', diff.imageChanges)}
                    ${row('Transform edits', diff.transformChanges)}
                    ${row('Hidden layers', diff.hiddenLayers)}
                    ${row('Deleted layers', diff.deletedLayers)}
                    <p style="font-size:11px; color:var(--text-muted); margin:12px 0 0 0;">Everything else passes through byte-identical.</p>
                    <div class="diff-actions">
                        <button class="diff-cancel">Cancel</button>
                        <button class="diff-confirm">Download JSON</button>
                    </div>
                </div>`;

            overlay.querySelector('.diff-cancel').addEventListener('click', () => overlay.remove());
            overlay.querySelector('.diff-confirm').addEventListener('click', () => { overlay.remove(); onConfirm(); });
            overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
            document.body.appendChild(overlay);
        }

        function doExport() {
            const finalData = buildExportData();

            if (finalData.assets) {
                finalData.assets.forEach(asset => {
                    if (asset.p !== undefined && !asset.layers) {
                        if (!imageAssetOverrides[asset.id] && asset.p.startsWith('data:image')) { asset.u = ""; asset.e = 1; }
                    }
                });
            }

            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(finalData));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", currentFileName);
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click(); downloadAnchorNode.remove();
        }

        document.getElementById('download-btn').addEventListener('click', function() {
            if (!originalData) return;
            showExportDiffDialog(doExport);
        });
    </script>
</body>
</html>
