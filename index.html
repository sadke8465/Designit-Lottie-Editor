                const replaceWrap = document.createElement('div'); replaceWrap.className = 'image-replace-btn-wrap';
                const replacedBadge = document.createElement('div'); replacedBadge.className = `image-replaced-badge${imageAssetOverrides[asset.id]?' visible':''}`; replacedBadge.textContent = imageAssetOverrides[asset.id] ? '✓ Replaced' : '';
                const fileInput = document.createElement('input'); fileInput.type = 'file'; fileInput.accept = 'image/png,image/jpeg,image/webp,image/gif,image/svg+xml';
                fileInput.addEventListener('change', function() {
                    const file = this.files[0]; if (!file) return;
                    const reader = new FileReader();
                    reader.onload = function(evt) {
                        pushUndoState(); imageAssetOverrides[asset.id] = { base64: evt.target.result, filename: file.name }; imageDataCache[asset.id] = evt.target.result;
                        applyModificationsAndRender();
                        if (imgEl.tagName==='IMG') imgEl.src = evt.target.result;
                        else { const newImg = document.createElement('img'); newImg.className = 'image-thumb-img'; newImg.src = evt.target.result; newImg.alt = asset.id; imgEl.replaceWith(newImg); }
                        replacedBadge.textContent = '✓ Replaced'; replacedBadge.classList.add('visible');
                    };
                    reader.readAsDataURL(file);
                });
                replaceWrap.appendChild(Object.assign(document.createElement('span'), { className: 'image-replace-btn', textContent: 'Replace Image' }));
                replaceWrap.appendChild(fileInput);
                info.appendChild(replaceWrap); info.appendChild(replacedBadge);
                card.appendChild(imgEl); card.appendChild(info); grid.appendChild(card);
            });
            wrap.appendChild(grid); container.appendChild(wrap);
        }

        // ===== ADVANCED TAB =====
        function renderAdvancedTab(container) {
            const wrap = document.createElement('div'); wrap.className = 'tab-content-advanced';
            const searchWrap = document.createElement('div'); searchWrap.style.cssText = 'position:relative;margin-bottom:14px;';
            searchWrap.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-3);pointer-events:none;"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><input type="text" id="layer-search" placeholder="Search layers…" value="${searchFilter}" style="width:100%;padding:8px 12px 8px 32px;border:1.5px solid var(--border-strong);border-radius:var(--radius-sm);font-size:12px;font-family:inherit;outline:none;background:var(--surface);color:var(--text-1);">`;
            wrap.appendChild(searchWrap);
            const searchInput = searchWrap.querySelector('#layer-search');
            searchInput.addEventListener('input', (e) => { searchFilter = e.target.value; applySearchFilter(); });
            if (searchFilter) requestAnimationFrame(() => { searchInput.focus(); searchInput.setSelectionRange(searchFilter.length, searchFilter.length); });
            const mainHeader = document.createElement('div'); mainHeader.className = 'list-section-header';
            mainHeader.innerHTML = `<span>Main Composition</span><span class="layer-count-badge">${layerGraph.roots.length}</span>`;
            wrap.appendChild(mainHeader);
            const mainRoots = layerGraph.roots.filter(id => { const node = layerGraph.nodes[id]; return node && node.parentId === null; });
            mainRoots.forEach(id => renderTreeNode(id, wrap, 0));
            if (!wrap._listenersAttached) { attachTreeListeners(wrap); wrap._listenersAttached = true; }
            container.appendChild(wrap);
            if (searchFilter) applySearchFilter();
        }

        function renderTreeNode(nodeId, container, depth) {
            const node = layerGraph.nodes[nodeId]; if (!node) return;
            const item = { id: node.id, layer: node.layer, index: node.index, contextName: node.contextName };
            const itemEl = createLayerHTML(item, node.category === 'empty');
            itemEl.setAttribute('data-layer-type', node.typeName);
            itemEl.style.marginLeft = `${depth * 14}px`;
            itemEl.style.width = `calc(100% - ${depth * 14}px)`;
            const nameEl = itemEl.querySelector('.layer-name');
            if (nameEl && node.typeName !== 'shape' && node.typeName !== 'image') {
                const badge = document.createElement('span'); badge.className = `type-badge ${node.typeName}`; badge.textContent = node.typeName;
                nameEl.appendChild(badge);
            }
            if (node.category==='structural'||node.category==='empty') { itemEl.style.opacity = node.category==='empty'?'0.5':'0.75'; itemEl.style.borderStyle = 'dashed'; }
            container.appendChild(itemEl);
            if (node.childIds.length > 0) node.childIds.forEach(childId => renderTreeNode(childId, container, depth + 1));
            if (node.precompChildIds.length > 0) {
                const precompWrap = document.createElement('div'); precompWrap.className = 'precomp-subtree';
                precompWrap.style.cssText = `margin-left:${(depth+1)*14}px;border-left:2px solid var(--accent-orange);padding-left:6px;display:none;`;
                precompWrap.setAttribute('data-precomp-for', nodeId);
                const actionsDiv = itemEl.querySelector('.layer-actions');
                if (actionsDiv) {
                    const expandBtn = document.createElement('button'); expandBtn.className = 'action-btn'; expandBtn.innerHTML = ICONS.folder; expandBtn.title = `Expand precomp (${node.precompChildIds.length} layers)`;
                    expandBtn.addEventListener('click', (e) => { e.stopPropagation(); const hidden = precompWrap.style.display==='none'; precompWrap.style.display = hidden?'block':'none'; expandBtn.style.color = hidden?'var(--accent-orange)':''; });
                    actionsDiv.insertBefore(expandBtn, actionsDiv.firstChild);
                }
                const precompRoots = node.precompChildIds.filter(cid => { const cn = layerGraph.nodes[cid]; return cn && cn.parentId === null; });
                precompRoots.forEach(cid => renderTreeNode(cid, precompWrap, 0));
                container.appendChild(precompWrap);
            }
        }

        function attachTreeListeners(listContainer) {
            listContainer.addEventListener('input', function(e) {
                if (e.target.tagName==='INPUT' && e.target.type!=='file') {
                    const id = e.target.getAttribute('data-id'); const type = e.target.getAttribute('data-type');
                    if (type==='pos') { layerMods[id][e.target.getAttribute('data-axis')] = parseFloat(e.target.value)||0; pushUndoStateDebounced(); scheduleRender(); }
                    else if (type==='scale') { layerMods[id][e.target.getAttribute('data-axis')] = parseFloat(e.target.value)||1.0; pushUndoStateDebounced(); scheduleRender(); }
                    else if (type==='opacity') { layerMods[id].op = Math.max(0,Math.min(100,parseFloat(e.target.value)||0)); pushUndoStateDebounced(); applyCosmeticOpacity(); }
                    else if (type==='token-color') { pushUndoState(); tokenDiffMap[e.target.getAttribute('data-token-path')] = e.target.value.toUpperCase(); applyModificationsAndRender(); }
                }
            });
            listContainer.addEventListener('change', function(e) {
                if (e.target.classList.contains('image-replace-input')) {
                    const refId = e.target.getAttribute('data-refid'); const file = e.target.files[0];
                    if (file) { const reader = new FileReader(); reader.onload = function(evt) { pushUndoState(); imageAssetOverrides[refId]={base64:evt.target.result,filename:file.name}; imageDataCache[refId]=evt.target.result; applyModificationsAndRender(); renderTreeSidebar(); }; reader.readAsDataURL(file); }
                }
            });
        }

        function applySearchFilter() {
            const query = searchFilter.toLowerCase().trim();
            if (!query) { document.querySelectorAll('.layer-item, .precomp-subtree').forEach(el => { el.style.display = ''; }); return; }
            document.querySelectorAll('.layer-item').forEach(el => { el.style.display = 'none'; });
            const matchingIds = new Set();
            for (const node of Object.values(layerGraph.nodes)) { const name=(node.layer.nm||'').toLowerCase(); if(name.includes(query)) matchingIds.add(node.id); }
            matchingIds.forEach(id => { const el = document.querySelector(`.layer-item[data-item-id="${id}"]`); if (el) el.style.display = ''; });
            matchingIds.forEach(id => {
                let node = layerGraph.nodes[id];
                while (node && node.parentId) { const parentEl = document.querySelector(`.layer-item[data-item-id="${node.parentId}"]`); if(parentEl) parentEl.style.display=''; node=layerGraph.nodes[node.parentId]; }
                node = layerGraph.nodes[id];
                if (node && node.context !== 'main') {
                    for (const n of Object.values(layerGraph.nodes)) {
                        if (n.precompAssetId===node.context) { const precompEl=document.querySelector(`.layer-item[data-item-id="${n.id}"]`); if(precompEl) precompEl.style.display=''; const subtree=document.querySelector(`[data-precomp-for="${n.id}"]`); if(subtree) subtree.style.display='block'; }
                    }
                }
            });
        }

        // ===== SECTION 9: UNDO/REDO =====
        function captureState() {
            const imageKeys = {};
            for (const [k, v] of Object.entries(imageAssetOverrides)) { imageKeys[k] = { filename: v.filename }; imageDataCache[k] = v.base64; }
            return { layerMods: JSON.parse(JSON.stringify(layerMods)), tokenDiffMap: JSON.parse(JSON.stringify(tokenDiffMap)), imageKeys };
        }
        function restoreState(snapshot) {
            layerMods = snapshot.layerMods; tokenDiffMap = snapshot.tokenDiffMap || {}; imageAssetOverrides = {};
            for (const [k, meta] of Object.entries(snapshot.imageKeys)) imageAssetOverrides[k] = { base64: imageDataCache[k], filename: meta.filename };
        }
        function pushUndoState() { undoStack.push(captureState()); if(undoStack.length>MAX_UNDO_STACK) undoStack.shift(); redoStack = []; }
        function pushUndoStateDebounced() {
            if (!undoStatePending) { pushUndoState(); undoStatePending = true; }
            clearTimeout(undoPushTimer);
            undoPushTimer = setTimeout(() => { undoStatePending = false; }, 600);
        }
        function undo() { if(undoStack.length===0) return; redoStack.push(captureState()); restoreState(undoStack.pop()); renderTreeSidebar(); applyModificationsAndRender(); }
        function redo() { if(redoStack.length===0) return; undoStack.push(captureState()); restoreState(redoStack.pop()); renderTreeSidebar(); applyModificationsAndRender(); }

        // ===== SECTION 10: SOLO & DEPENDENCY LOGIC =====
        function calculateSoloDependencies() {
            let anySolo = false; let soloContexts = {}; let neededPrecomps = new Set();
            for (const [id, mod] of Object.entries(layerMods)) {
                if (mod.solo && !mod.deleted) {
                    anySolo = true; const node = layerGraph.nodes[id]; if (!node) continue;
                    if (!soloContexts[node.context]) soloContexts[node.context] = new Set();
                    soloContexts[node.context].add(id);
                }
            }
            if (!anySolo) return { anySolo, soloContexts, neededPrecomps };
            for (const contextKey of Object.keys(soloContexts)) { if (contextKey !== 'main') neededPrecomps.add(contextKey); }
            let changed = true;
            while (changed) {
                changed = false;
                for (const node of Object.values(layerGraph.nodes)) {
                    if (node.ty===0 && node.precompAssetId && neededPrecomps.has(node.precompAssetId)) {
                        if (node.context !== 'main' && !neededPrecomps.has(node.context)) { neededPrecomps.add(node.context); changed = true; }
                    }
                }
            }
            return { anySolo, soloContexts, neededPrecomps };
        }

        // ===== SECTION 11: MODIFICATION & RENDER PIPELINE =====
        function applyModsToArray(layersArray, prefix, anySolo, soloContexts, neededPrecomps) {
            let finalLayers = [];
            const contextKey = prefix === 'main' ? 'main' : prefix.replace('asset_', '');
            const contextHasSolo = soloContexts && soloContexts[contextKey];
            layersArray.forEach((layer, index) => {
                const id = `${prefix}__${index}`; const mod = layerMods[id];
                if (!mod || mod.deleted) return;
                if (anySolo) {
                    if (contextHasSolo) { if(mod.solo) layer.hd=false; else if(layer.ty===0&&layer.refId&&neededPrecomps.has(layer.refId)) layer.hd=false; else layer.hd=true; }
                    else if (neededPrecomps.has(contextKey)) { if(!mod.visible) layer.hd=true; }
                    else { if(!mod.visible) layer.hd=true; }
                } else { if(!mod.visible) layer.hd=true; }
                const ks = layer.ks;
                if (ks) {
                    const op=mod.op; if(op!==100&&ks.o){const multiplier=op/100;if(typeof ks.o.k==='number') ks.o.k*=multiplier;else if(Array.isArray(ks.o.k)){ks.o.k.forEach(kf=>{if(kf.s)kf.s[0]*=multiplier;if(kf.e)kf.e[0]*=multiplier;});}}
                    const dx=mod.dx;const dy=mod.dy; if((dx!==0||dy!==0)&&ks.p){const isAnimated=ks.p.a===1;if(!isAnimated&&Array.isArray(ks.p.k)){ks.p.k[0]+=dx;ks.p.k[1]+=dy;}else if(isAnimated&&Array.isArray(ks.p.k)){ks.p.k.forEach(kf=>{if(kf.s){kf.s[0]+=dx;kf.s[1]+=dy;}if(kf.e){kf.e[0]+=dx;kf.e[1]+=dy;}});}}
                    const sx=mod.sx;const sy=mod.sy; if((sx!==1.0||sy!==1.0)&&ks.s){const isAnimated=ks.s.a===1;if(!isAnimated&&Array.isArray(ks.s.k)){ks.s.k[0]*=sx;ks.s.k[1]*=sy;}else if(isAnimated&&Array.isArray(ks.s.k)){ks.s.k.forEach(kf=>{if(kf.s){kf.s[0]*=sx;kf.s[1]*=sy;}if(kf.e){kf.e[0]*=sx;kf.e[1]*=sy;}});}}
                }
                finalLayers.push(layer);
            });
            return finalLayers;
        }

        function applyModificationsAndRender() {
            if (!originalData) return;
            modifiedData = JSON.parse(JSON.stringify(originalData));
            modifiedData.w = parseInt(document.getElementById('canvas-w').value) || modifiedData.w;
            modifiedData.h = parseInt(document.getElementById('canvas-h').value) || modifiedData.h;
            for (const [pathStr, newHex] of Object.entries(tokenDiffMap)) applyColorTokenToData(modifiedData, pathStr, newHex);
            const { anySolo, soloContexts, neededPrecomps } = calculateSoloDependencies();
            if (modifiedData.layers) modifiedData.layers = applyModsToArray(modifiedData.layers, 'main', anySolo, soloContexts, neededPrecomps);
            if (modifiedData.assets) modifiedData.assets.forEach(asset => { if(asset.layers) asset.layers = applyModsToArray(asset.layers, `asset_${asset.id}`, anySolo, soloContexts, neededPrecomps); });
            if (modifiedData.assets && Object.keys(imageAssetOverrides).length > 0) {
                modifiedData.assets.forEach(asset => { if(imageAssetOverrides[asset.id]){asset.p=imageAssetOverrides[asset.id].base64;asset.u="";asset.e=1;} });
            }
            renderAnimation();
        }

        function renderAnimation() {
            const container = document.getElementById('lottie-player'); container.innerHTML = '';
            let wasPaused = animInstance ? animInstance.isPaused : false;
            let currentFrame = animInstance ? animInstance.currentFrame : 0;
            let currentSpeed = parseFloat(document.getElementById('play-speed').value) || 1.0;
            if (animInstance) animInstance.destroy();
            animInstance = lottie.loadAnimation({ container, renderer: 'svg', loop: true, autoplay: false, animationData: JSON.parse(JSON.stringify(modifiedData)) });
            animInstance.setSpeed(currentSpeed);
            animInstance.addEventListener('DOMLoaded', () => {
                buildSvgLayerMap(); applyCosmeticOpacity(); updatePlayerSize();
                const svgElement = container.querySelector('svg');
                if (svgElement) svgElement.setAttribute('preserveAspectRatio', 'xMidYMid meet');
                updateCanvasHighlights(); updateDynamicBBoxes();
                slider.max = animInstance.totalFrames; document.getElementById('total-frames').innerText = Math.round(animInstance.totalFrames);
                playPauseBtn.innerHTML = wasPaused ? ICONS.play : ICONS.pause;
                if (wasPaused) animInstance.goToAndStop(currentFrame, true); else animInstance.goToAndPlay(currentFrame, true);
            });
            animInstance.addEventListener('enterFrame', (e) => {
                slider.value = Math.round(e.currentTime); currentFrameEl.innerText = Math.round(e.currentTime);
                updateDynamicBBoxes();
                if (!frameHighlightTimer) { frameHighlightTimer = setTimeout(() => { updateActiveFrameHighlights(e.currentTime); frameHighlightTimer = null; }, 150); }
            });
        }

        function buildSvgLayerMap() {
            svgLayerMap = {};
            if (!animInstance || !animInstance.renderer || !animInstance.renderer.elements) return;
            function mapElements(rendererElements, prefix) {
                if (!rendererElements) return;
                for (let i=0;i<rendererElements.length;i++) {
                    const el = rendererElements[i]; if (!el) continue;
                    const id = `${prefix}__${i}`;
                    const svgNode = el.layerElement || el.baseElement || null;
                    if (svgNode) { svgLayerMap[id] = svgNode; svgNode.classList.add('lottie-layer', `lottie-layer-${id}`); }
                    if (el.elements && el.data && el.data.refId) mapElements(el.elements, `asset_${el.data.refId}`);
                }
            }
            mapElements(animInstance.renderer.elements, 'main');
        }

        function scheduleRender() { if(renderDebounceId) cancelAnimationFrame(renderDebounceId); renderDebounceId = requestAnimationFrame(() => { renderDebounceId = null; applyModificationsAndRender(); }); }

        function applyCosmeticOpacity() {
            let styleEl = document.getElementById('cosmetic-overrides');
            if (!styleEl) { styleEl = document.createElement('style'); styleEl.id = 'cosmetic-overrides'; document.head.appendChild(styleEl); }
            let css = '';
            for (const [id, mod] of Object.entries(layerMods)) {
                if (mod.deleted) continue;
                if (mod.op !== 100) { const escapedId = CSS.escape(id); css += `.lottie-layer-${escapedId} { opacity: ${mod.op/100} !important; }\n`; }
            }
            styleEl.textContent = css;
        }

        // ===== SECTION 12: EXPORT =====
        function buildExportData() {
            const exportData = JSON.parse(JSON.stringify(originalData));
            exportData.w = parseInt(document.getElementById('canvas-w').value) || exportData.w;
            exportData.h = parseInt(document.getElementById('canvas-h').value) || exportData.h;
            for (const [pathStr, newHex] of Object.entries(tokenDiffMap)) applyColorTokenToData(exportData, pathStr, newHex);
            const { anySolo, soloContexts, neededPrecomps } = calculateSoloDependencies();
            if (exportData.layers) exportData.layers = applyModsToArray(exportData.layers, 'main', anySolo, soloContexts, neededPrecomps);
            if (exportData.assets) exportData.assets.forEach(asset => { if(asset.layers) asset.layers = applyModsToArray(asset.layers, `asset_${asset.id}`, anySolo, soloContexts, neededPrecomps); });
            if (exportData.assets && Object.keys(imageAssetOverrides).length > 0) { exportData.assets.forEach(asset => { if(imageAssetOverrides[asset.id]){asset.p=imageAssetOverrides[asset.id].base64;asset.u="";asset.e=1;} }); }
            function stripCl(layers) { if (!layers) return; layers.forEach(l => delete l.cl); }
            stripCl(exportData.layers);
            if (exportData.assets) exportData.assets.forEach(a => { if(a.layers) stripCl(a.layers); });
            return exportData;
        }

        function getExportDiff() {
            const colorChanges = Object.keys(tokenDiffMap).length;
            const imageChanges = Object.keys(imageAssetOverrides).length;
            const deletedLayers = Object.values(layerMods).filter(m => m.deleted).length;
            const hiddenLayers = Object.values(layerMods).filter(m => !m.visible && !m.deleted).length;
            const transformChanges = Object.values(layerMods).filter(m => m.dx!==0||m.dy!==0||m.sx!==1||m.sy!==1||m.op!==100).length;
            return { colorChanges, imageChanges, deletedLayers, hiddenLayers, transformChanges };
        }

        function showExportDiffDialog(onConfirm) {
            const diff = getExportDiff();
            const total = diff.colorChanges + diff.imageChanges + diff.deletedLayers + diff.hiddenLayers + diff.transformChanges;
            const overlay = document.createElement('div'); overlay.className = 'diff-overlay';
            function statBox(count, label) {
                const cls = count > 0 ? 'diff-stat-num active' : 'diff-stat-num zero';
                return `<div class="diff-stat"><div class="${cls}">${count > 0 ? count : '—'}</div><div class="diff-stat-label">${label}</div></div>`;
            }
            overlay.innerHTML = `
                <div class="diff-dialog">
                    <div class="diff-handle"></div>
                    <h4>Export Summary</h4>
                    <p class="diff-subtitle">${total===0?'No changes — identical to original.':`${total} change${total!==1?'s':''} will be baked in.`}</p>
                    <div class="diff-stats">
                        ${statBox(diff.colorChanges, 'Color changes')}
                        ${statBox(diff.imageChanges, 'Image replacements')}
                        ${statBox(diff.transformChanges, 'Transform edits')}
                        ${statBox(diff.hiddenLayers + diff.deletedLayers, 'Layers removed')}
                    </div>
                    <p class="diff-note">Everything else passes through byte-identical.</p>
                    <div class="diff-actions">
                        <button class="diff-cancel">Cancel</button>
                        <button class="diff-confirm">Download JSON</button>
                    </div>
                </div>`;
            overlay.querySelector('.diff-cancel').addEventListener('click', () => animateDialogOut(overlay));
            overlay.querySelector('.diff-confirm').addEventListener('click', () => animateDialogOut(overlay, onConfirm));
            overlay.addEventListener('click', (e) => { if (e.target === overlay) animateDialogOut(overlay); });
            document.body.appendChild(overlay);
            if (typeof anime !== 'undefined') {
                const dialog = overlay.querySelector('.diff-dialog');
                dialog.style.transform = 'translateY(100%)';
                anime({ targets: overlay, opacity: [0, 1], duration: 220, easing: 'linear' });
                anime({ targets: dialog, translateY: ['100%', '0%'], duration: 460, easing: 'cubicBezier(0.16, 1, 0.3, 1)' });
            }
        }

        function doExport() {
            const finalData = buildExportData();
            if (finalData.assets) { finalData.assets.forEach(asset => { if(asset.p!==undefined&&!asset.layers){if(!imageAssetOverrides[asset.id]&&asset.p.startsWith('data:image')){asset.u="";asset.e=1;}} }); }
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(finalData));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", currentFileName);
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click(); downloadAnchorNode.remove();
        }

        document.getElementById('download-btn').addEventListener('click', function() {
            if (!originalData) return;
            showExportDiffDialog(doExport);
        });

    </script>
</body>
</html>
